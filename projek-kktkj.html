        const App = () => {
            // Lazy State Initializer: Memulihkan status penuh dari localStorage jika ada, agar survive dari mati listrik
            const [time, setTime] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_time');

            const [isRunning, setIsRunning] = useState(() => {

            const [isModalOpen, setIsModalOpen] = useState(false);

            // State untuk melacak panel yang terbuka di masing-masing kelompok [Klp1, Klp2, Klp3]

            const [openIpOverlays, setOpenIpOverlays] = useState([false, false, false]);

            // Konfigurasi awal Kelompok & 4 Tugas terpisah dengan newline (\n) untuk 2 baris
            const [rawTitles, setRawTitles] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_rawTitles');

            });

            const [taskNames, setTaskNames] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_taskNames');
                return saved ? JSON.parse(saved) : [
                    "SPLICING\nFO",
                    "HITUNG\nVLSM",
                    "KONFIGURASI\nROUTER",
                    "TROUBLE\nSHOOTING"
                ];
            });

            // Splicing FO: 60m (3600s), VLSM: 30m (1800s), Konfigurasi Router: 30m (1800s)
            const taskMaxTimes = [3600, 1800, 1800, null];

            // Penjaga stabilitas waktu saat tab tidak aktif (survive background/minimize tab)
            const startTimeRef = useRef(0);
            const elapsedRef = useRef(time); // Inisialisasi Ref sesuai dengan durasi waktu yang dipulihkan

            // State hasil tugas kelompok
            const [sampleResults, setSampleResults] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_sampleResults');
                return saved ? JSON.parse(saved) : [
                    { id: 1, taskTimes: [null, null, null, null] },
                    { id: 2, taskTimes: [null, null, null, null] },
                    { id: 3, taskTimes: [null, null, null, null] }

            });

            // State toggle freeze / selesai manual
            const [groupFreezeTimes, setGroupFreezeTimes] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_groupFreezeTimes');
                return saved ? JSON.parse(saved) : [null, null, null];
            });

            const groupFreezeTimesRef = useRef(groupFreezeTimes);

            useEffect(() => {
                groupFreezeTimesRef.current = groupFreezeTimes;
            }, [groupFreezeTimes]);

            // State Pengacakan Anggota (Maksimal 4 Siswa) - TETAP DIATUR SEPERTI INI, JANGAN DIUBAH
            const [group1NamesInput, setGroup1NamesInput] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_group1NamesInput');
                return saved || "Siswa A1\nSiswa A2\nSiswa A3\nSiswa A4";
            });
            const [group2NamesInput, setGroup2NamesInput] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_group2NamesInput');
                return saved || "Siswa B1\nSiswa B2\nSiswa B3\nSiswa B4";
            });
            const [group3NamesInput, setGroup3NamesInput] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_group3NamesInput');
                return saved || "Siswa C1\nSiswa C2\nSiswa C3\nSiswa C4";
            });

            const [shuffledLists, setShuffledLists] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_shuffledLists');
                return saved ? JSON.parse(saved) : [
                    ["Siswa A1", "Siswa A2", "Siswa A3", "Siswa A4"],
                    ["Siswa B1", "Siswa B2", "Siswa B3", "Siswa B4"],
                    ["Siswa C1", "Siswa C2", "Siswa C3", "Siswa C4"]
                ];
            });

            const [shufflingGroups, setShufflingGroups] = useState([false, false, false]);

            // State IP dan Host Dinamis untuk masing-masing kelompok
            const [groupIpConfigs, setGroupIpConfigs] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_groupIpConfigs');
                return saved ? JSON.parse(saved) : [
                    {
                        baseIp: "---",
                        segments: [
                            { name: "PC A", hosts: "-" },
                            { name: "RA-RB", hosts: "-" },
                            { name: "PC B", hosts: "-" },
                            { name: "RB-RC", hosts: "-" },
                            { name: "PC C", hosts: "-" },
                            { name: "RC-RD", hosts: "-" },
                            { name: "PC D", hosts: "-" }
                        ]
                    },
                    {
                        baseIp: "---",
                        segments: [
                            { name: "PC A", hosts: "-" },
                            { name: "RA-RB", hosts: "-" },
                            { name: "PC B", hosts: "-" },
                            { name: "RB-RC", hosts: "-" },
                            { name: "PC C", hosts: "-" },
                            { name: "RC-RD", hosts: "-" },
                            { name: "PC D", hosts: "-" }
                        ]
                    },
                    {
                        baseIp: "---",
                        segments: [
                            { name: "PC A", hosts: "-" },
                            { name: "RA-RB", hosts: "-" },
                            { name: "PC B", hosts: "-" },
                            { name: "RB-RC", hosts: "-" },
                            { name: "PC C", hosts: "-" },
                            { name: "RC-RD", hosts: "-" },
                            { name: "PC D", hosts: "-" }
                        ]
                    }
                ];
            });

            // State Input Mentah Format IP & Host untuk masing-masing kelompok
            const [rawIpInputs, setRawIpInputs] = useState(() => {
                const saved = localStorage.getItem('kk_tkj_rawIpInputs');
                return saved ? JSON.parse(saved) : ["", "", ""];
            });

            // --- EFFECT HOOKS UNTUK PERSISTENSI LOCALSTORAGE SECARA OTOMATIS ---
            useEffect(() => {
                localStorage.setItem('kk_tkj_time', time.toString());
            }, [time]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_isRunning', isRunning.toString());
            }, [isRunning]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_rawTitles', rawTitles);
            }, [rawTitles]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_taskNames', JSON.stringify(taskNames));
            }, [taskNames]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_sampleResults', JSON.stringify(sampleResults));
            }, [sampleResults]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_groupFreezeTimes', JSON.stringify(groupFreezeTimes));
            }, [groupFreezeTimes]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_group1NamesInput', group1NamesInput);
                localStorage.setItem('kk_tkj_group2NamesInput', group2NamesInput);
                localStorage.setItem('kk_tkj_group3NamesInput', group3NamesInput);
            }, [group1NamesInput, group2NamesInput, group3NamesInput]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_shuffledLists', JSON.stringify(shuffledLists));
            }, [shuffledLists]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_groupIpConfigs', JSON.stringify(groupIpConfigs));
            }, [groupIpConfigs]);

            useEffect(() => {
                localStorage.setItem('kk_tkj_rawIpInputs', JSON.stringify(rawIpInputs));
            }, [rawIpInputs]);


            const getTitles = () => {
                const lines = rawTitles.split(/\r?\n/);
                return [
                    lines[0] || 'KELOMPOK 1',
                    lines[1] || 'KELOMPOK 2',
                    lines[2] || 'KELOMPOK 3'
                ];
            };

            const titles = getTitles();

            // Interval Timer Utama (Akurat, Survive Tab Inactivity) - Hitung Mundur dari 165 Menit (9900 Detik)
            useEffect(() => {
                let interval = null;

                if (isRunning) {
                    startTimeRef.current = Date.now() - elapsedRef.current * 1000;

                    const tick = () => {
                        const nextTime = Math.floor((Date.now() - startTimeRef.current) / 1000);
                        
                        // Batasi maksimum waktu berjalan pada 165 Menit (9900 detik)
                        const finalTime = Math.min(9900, nextTime);
                        setTime(finalTime);
                        elapsedRef.current = finalTime;

                        if (finalTime >= 9900) {
                            setIsRunning(false);
                        }

                        // Periksa transisi tugas otomatis secara real-time
                        setSampleResults((prevResults) => 
                            prevResults.map((sample, sIdx) => {
                                if (groupFreezeTimesRef.current[sIdx] !== null) return sample;

                                const activeIdx = sample.taskTimes.findIndex(t => t === null);
                                if (activeIdx === -1) return sample;

                                const previousTime = activeIdx === 0 ? 0 : sample.taskTimes[activeIdx - 1];
                                const elapsedInTask = finalTime - previousTime;

                                // Auto transition sesuai batas waktu (Splicing FO: 60m, VLSM: 30m, Router: 30m)
                                if (activeIdx === 0 && elapsedInTask >= 3600) {
                                    const newTimes = [...sample.taskTimes];
                                    newTimes[0] = 3600;
                                    return { ...sample, taskTimes: newTimes };
                                }
                                if (activeIdx === 1 && elapsedInTask >= 1800) {
                                    const newTimes = [...sample.taskTimes];
                                    newTimes[1] = previousTime + 1800;
                                    return { ...sample, taskTimes: newTimes };
                                }
                                if (activeIdx === 2 && elapsedInTask >= 1800) {
                                    const newTimes = [...sample.taskTimes];
                                    newTimes[2] = previousTime + 1800;
                                    return { ...sample, taskTimes: newTimes };
                                }
                                // Troubleshooting selesai otomatis saat batas maksimal 165 Menit (9900 detik) tercapai
                                if (activeIdx === 3 && finalTime >= 9900) {
                                    const newTimes = [...sample.taskTimes];
                                    newTimes[3] = 9900;
                                    return { ...sample, taskTimes: newTimes };
                                }

                                return sample;
                            })
                        );
                    };

                    tick();
                    interval = setInterval(tick, 200);

                    // Sinkronisasi paksa saat tab dibuka kembali dari status minimize
                    const handleTabActive = () => {
                        if (document.visibilityState === 'visible') {
                            tick();
                        }
                    };

                    document.addEventListener('visibilitychange', handleTabActive);
                    window.addEventListener('focus', handleTabActive);

                    return () => {
                        clearInterval(interval);
                        document.removeEventListener('visibilitychange', handleTabActive);
                        window.removeEventListener('focus', handleTabActive);
                    };
                }
            }, [isRunning]);

            const toggleTimer = () => setIsRunning(!isRunning);

            // Buka Modal Konfirmasi Reset Manual (Stop Button)
            const handleStopAndReset = () => {
                setIsResetConfirmOpen(true);
            };

            // Bersihkan semua data LocalStorage saat eksekusi Reset
            const executeReset = () => {
                setIsResetConfirmOpen(false);
                setIsRunning(false);
                setTime(0);
                elapsedRef.current = 0;
                setGroupFreezeTimes([null, null, null]);
                setSampleResults([
                    { id: 1, taskTimes: [null, null, null, null] },
                    { id: 2, taskTimes: [null, null, null, null] },
                    { id: 3, taskTimes: [null, null, null, null] }
                ]);
                setGroupIpConfigs([
                    {
                        baseIp: "---",
                        segments: [
                            { name: "PC A", hosts: "-" },
                            { name: "RA-RB", hosts: "-" },
                            { name: "PC B", hosts: "-" },
                            { name: "RB-RC", hosts: "-" },
                            { name: "PC C", hosts: "-" },
                            { name: "RC-RD", hosts: "-" },
                            { name: "PC D", hosts: "-" }
                        ]
                    },
                    {
                        baseIp: "---",
                        segments: [
                            { name: "PC A", hosts: "-" },
                            { name: "RA-RB", hosts: "-" },
                            { name: "PC B", hosts: "-" },
                            { name: "RB-RC", hosts: "-" },
                            { name: "PC C", hosts: "-" },
                            { name: "RC-RD", hosts: "-" },
                            { name: "PC D", hosts: "-" }
                        ]
                    },
                    {
                        baseIp: "---",
                        segments: [
                            { name: "PC A", hosts: "-" },
                            { name: "RA-RB", hosts: "-" },
                            { name: "PC B", hosts: "-" },
                            { name: "RB-RC", hosts: "-" },
                            { name: "PC C", hosts: "-" },
                            { name: "RC-RD", hosts: "-" },
                            { name: "PC D", hosts: "-" }
                        ]
                    }
                ]);
                setRawIpInputs(["", "", ""]);
                
                // Pembersihan storage bersih
                localStorage.removeItem('kk_tkj_time');
                localStorage.removeItem('kk_tkj_isRunning');
                localStorage.removeItem('kk_tkj_groupFreezeTimes');
                localStorage.removeItem('kk_tkj_sampleResults');
                localStorage.removeItem('kk_tkj_shuffledLists');
                localStorage.removeItem('kk_tkj_groupIpConfigs');
                localStorage.removeItem('kk_tkj_rawIpInputs');
            };

            const handleTaskClick = (sampleIndex, taskIndex) => {
                if (!isRunning && time === 0) return; 
                if (groupFreezeTimes[sampleIndex] !== null) return;

                setSampleResults(prev => prev.map((s, sIdx) => {
                    if (sIdx === sampleIndex) {
                        const activeIdx = s.taskTimes.findIndex(t => t === null);
                        if (activeIdx !== taskIndex) return s;

                        const newTimes = [...s.taskTimes];
                        if (newTimes[taskIndex] === null) {
                            newTimes[taskIndex] = time;
                        }
                        return { ...s, taskTimes: newTimes };
                    }
                    return s;
                }));
            };

            const handleTaskRightClick = (e, sampleIndex, taskIndex) => {
                e.preventDefault(); 
                if (groupFreezeTimes[sampleIndex] !== null) return;

                setSampleResults(prev => prev.map((s, sIdx) => {
                    if (sIdx === sampleIndex) {
                        const newTimes = [...s.taskTimes];
                        newTimes[taskIndex] = null;
                        return { ...s, taskTimes: newTimes };
                    }
                    return s;
                }));
            };

            // Klik waktu utama kelompok untuk freeze manual / unfreeze (antisipasi salah klik)
            const handleGroupTimerClick = (sIdx) => {
                if (!isRunning && time === 0) return;
                
                setGroupFreezeTimes(prev => {
                    const next = [...prev];
                    if (next[sIdx] !== null) {
                        next[sIdx] = null;
                    } else {
                        next[sIdx] = time;
                    }
                    return next;
                });
            };

            // Format waktu kumulatif Menit:Detik (contoh: 165:00, 102:44)
            const formatTime = (seconds) => {
                if (seconds === null) return "--:--";
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const getDisplayTimeForGroup = (sample, sIdx) => {
                if (groupFreezeTimes[sIdx] !== null) {
                    return groupFreezeTimes[sIdx];
                }
                const allTasksFinished = sample.taskTimes.every(t => t !== null);
                if (allTasksFinished) {
                    return Math.max(...sample.taskTimes);
                }
                return time;
            };

            // Menghitung Sisa Waktu Tugas secara Mundur (Countdown) - Sangat Presisi & Mendukung Akumulasi Waktu
            const getTaskDisplayTime = (sample, tIdx, sIdx) => {
                const T0 = sample.taskTimes[0];
                const T1 = sample.taskTimes[1];
                const T2 = sample.taskTimes[2];

                // Hitung sisa waktu hemat dari tugas yang sudah diselesaikan
                const R0 = T0 !== null ? Math.max(0, 3600 - T0) : 0;
                const R1 = (T1 !== null && T0 !== null) ? Math.max(0, 1800 - (T1 - T0)) : 0;
                const R2 = (T2 !== null && T1 !== null) ? Math.max(0, 1800 - (T2 - T1)) : 0;

                // Batas waktu dasar Troubleshooting adalah 45 menit (2700 detik) + bonus sisa waktu tugas sebelumnya
                const troubleshootingBaseLimit = 2700;
                const troubleshootingTotalLimit = troubleshootingBaseLimit + R0 + R1 + R2;

                const activeIdx = sample.taskTimes.findIndex(t => t === null);

                // 1. Jika tugas tertentu sudah selesai diklik (Lock hasil akhir sisa waktunya)
                if (sample.taskTimes[tIdx] !== null) {
                    const completedAt = sample.taskTimes[tIdx];
                    if (tIdx === 0) {
                        return Math.max(0, 3600 - completedAt);
                    } else if (tIdx === 1) {
                        return Math.max(0, 1800 - (completedAt - T0));
                    } else if (tIdx === 2) {
                        return Math.max(0, 1800 - (completedAt - T1));
                    } else { // tIdx === 3 (Troubleshooting selesai)
                        return Math.max(0, troubleshootingTotalLimit - (completedAt - T2));
                    }
                }
                
                // 2. Jika tugas tersebut sedang aktif dikerjakan (Sedang berjalan secara real-time)
                const currentReferenceTime = groupFreezeTimes[sIdx] !== null ? groupFreezeTimes[sIdx] : time;
                if (activeIdx === tIdx && (isRunning || time > 0)) {
                    if (tIdx === 0) {
                        return Math.max(0, 3600 - currentReferenceTime);
                    } else if (tIdx === 1) {
                        return Math.max(0, 1800 - (currentReferenceTime - T0));
                    } else if (tIdx === 2) {
                        return Math.max(0, 1800 - (currentReferenceTime - T1));
                    } else { // tIdx === 3 (Troubleshooting sedang aktif berjalan)
                        return Math.max(0, troubleshootingTotalLimit - (currentReferenceTime - T2));
                    }
                }

                // 3. Jika tugas belum aktif / belum dimulai (Menampilkan waktu awal / sisa waktu statis saat ini)
                if (tIdx === 0) {
                    return 3600; // Splicing FO: 60:00
                } else if (tIdx === 1) {
                    return 1800; // VLSM: 30:00
                } else if (tIdx === 2) {
                    return 1800; // Router: 30:00
                } else { // tIdx === 3 (Troubleshooting belum aktif)
                    // Menampilkan 45:00 + sisa waktu dari tugas-tugas yang telah selesai sejauh ini (tetap diam/tidak berkurang)
                    return troubleshootingTotalLimit;
                }
            };

            // Helper reaktif untuk menangani perubahan input nama siswa di parent state
            const handleInputChange = (sIdx, value) => {
                if (sIdx === 0) setGroup1NamesInput(value);
                else if (sIdx === 1) setGroup2NamesInput(value);
                else if (sIdx === 2) setGroup3NamesInput(value);
            };

            // Logika Parsing Skema IP dan Kebutuhan Host dari Input Guru/Siswa
            const handleSaveIpConfig = (sIdx) => {
                const inputText = rawIpInputs[sIdx].trim();
                if (!inputText) return;
                
                // Split string berdasarkan tanda pipe "|"
                const parts = inputText.split("|").map(p => p.trim());
                if (parts.length < 8) {
                    // Abaikan jika tidak lengkap
                    return;
                }

                const baseIp = parts[0];
                const pcA = parts[1] || "-";
                const ra_rb = parts[2] || "-";
                const pcB = parts[3] || "-";
                const rb_rc = parts[4] || "-";
                const pcC = parts[5] || "-";
                const rc_rd = parts[6] || "-";
                const pcD = parts[7] || "-";

                setGroupIpConfigs(prev => prev.map((config, idx) => {
                    if (idx === sIdx) {
                        return {
                            baseIp: baseIp,
                            segments: [
                                { name: "PC A", hosts: pcA },
                                { name: "RA-RB", hosts: ra_rb },
                                { name: "PC B", hosts: pcB },
                                { name: "RB-RC", hosts: rb_rc },
                                { name: "PC C", hosts: pcC },
                                { name: "RC-RD", hosts: rc_rd },
                                { name: "PC D", hosts: pcD }
                            ]
                        };
                    }
                    return config;
                }));
            };

            // Animasi Pengacakan 4 Siswa (Didesain pintar agar jika siswa < 4, slot bawah otomatis dikosongkan secara statis)
            const handleShuffle = (groupIdx, inputString) => {
                if (shufflingGroups[groupIdx]) return;

                setShufflingGroups(prev => {
                    const next = [...prev];
                    next[groupIdx] = true;
                    return next;
                });

                const lines = inputString.split(/\r?\n/).map(name => name.trim()).filter(Boolean);
                const actualNames = lines.slice(0, 4); // Maksimal 4 nama
                const activeCount = actualNames.length;

                let ticks = 0;
                const maxTicks = 15;

                const interval = setInterval(() => {
                    setShuffledLists(prev => {
                        const next = prev.map((list, idx) => {
                            if (idx === groupIdx) {
                                // Hanya acak data nama siswa yang benar-benar dimasukkan
                                const temp = [...actualNames];
                                for (let i = temp.length - 1; i > 0; i--) {
                                    const j = Math.floor(Math.random() * (i + 1));
                                    [temp[i], temp[j]] = [temp[j], temp[i]];
                                }
                                // Isi sisa slot bawah yang kosong dengan tanda hubung "---"
                                while (temp.length < 4) {
                                    temp.push("---");
                                }
                                return temp;
                            }
                            return list;
                        });
                        return next;
                    });

                    ticks++;
                    if (ticks >= maxTicks) {
                        clearInterval(interval);
                        setShuffledLists(prev => {
                            const next = prev.map((list, idx) => {
                                if (idx === groupIdx) {
                                    const final = [...actualNames];
                                    for (let i = final.length - 1; i > 0; i--) {
                                        const j = Math.floor(Math.random() * (i + 1));
                                        [final[i], final[j]] = [final[j], final[i]];
                                    }
                                    while (final.length < 4) {
                                        final.push("---");
                                    }
                                    return final;
                                }
                                return list;
                            });
                            return next;
                        });
                        setShufflingGroups(prev => {
                            const next = [...prev];
                            next[groupIdx] = false;
                            return next;
                        });
                    }
                }, 200);
            };

            const getInputs = [group1NamesInput, group2NamesInput, group3NamesInput];

                                                        <button

                                                            className="bg-[#00A19C] hover:bg-[#002D72] text-[#FDFDFD] font-black px-4 h-[100px] text-xs uppercase tracking-wider transition-all rounded shadow-sm shrink-0 flex items-center justify-center"
                                                        >

                                                        </button>

                                                </div>

                                    {/* PANEL DETAIL ALOKASI IP & HOST - TELEMETRY RACING THEME */}
                                    {openIpOverlays[sIdx] && (

                                            isGroupFinished ? 'bg-[#00A19C]/5 border-[#00A19C]' : 'bg-[#f8fafc] border-[#002D72]/10'
                                        }`}
                                        title={isManualFrozen ? "Klik untuk melanjutkan waktu" : "Klik untuk menghentikan & menyelesaikan kelompok"}
                                    >
                                         <h3 className={`text-[16px] font-black uppercase tracking-[0.4em] mb-4 transition-colors group-hover/timer:text-[#00A19C] ${
                                             isGroupFinished ? 'text-[#00A19C]' : 'text-[#002D72]/40'
                                         }`}>
                                             {titles[sIdx]}
                                         </h3>
                                         
                                         {/* Sisa waktu countdown kelompok menggunakan Bebas Neue Tebal */}
                                         <div className={`text-[110px] font-bebas font-black tracking-wider leading-none transition-colors group-hover/timer:scale-105 duration-200 transform ${
                                             isGroupFinished ? 'text-[#00A19C]' : isRunning ? 'text-[#002D72]' : 'text-slate-200'
                                         }`}>
                                             {formatTime(Math.max(0, 9900 - groupTime))}
                                         </div>
                                         
                                         {isManualFrozen && (
                                             <span className="text-[10px] font-black text-[#00A19C] tracking-widest uppercase mt-2 opacity-80 animate-pulse">
                                                 MANUAL FINISH
                                             </span>
                                         )}
                                    </button>

                                    {/* Area Tugas-Tugas */}
                                    <div className="p-5 flex-1 space-y-3 bg-[#FDFDFD]">
                                        {taskNames.map((taskName, tIdx) => {
                                            const completedAt = sample.taskTimes[tIdx];
                                            const isDone = completedAt !== null;
                                            
                                            const activeIdx = sample.taskTimes.findIndex(t => t === null);
                                            // Menjaga status isActive tetap aktif meskipun kelompok sedang di-freeze manual (agar tetap hijau)
                                            const isActive = activeIdx === tIdx && (isRunning || time > 0);
                                            
                                            const displaySeconds = getTaskDisplayTime(sample, tIdx, sIdx);
                                            
                                            // Split berdasarkan newline (\n) untuk 2 baris
                                            const lines = taskName.split('\n');

                                            return (
                                                <div 
                                                    key={tIdx}
                                                    onContextMenu={(e) => handleTaskRightClick(e, sIdx, tIdx)}
                                                    onClick={() => handleTaskClick(sIdx, tIdx)}
                                                    className={`relative flex items-center justify-between pl-2.5 pr-2 py-0 border-2 transition-all cursor-pointer select-none overflow-hidden group h-[76px] ${
                                                        isDone 
                                                        ? 'bg-[#00A19C] border-[#00A19C] text-[#FDFDFD]' 
                                                        : isActive
                                                        ? 'bg-[#FDFDFD] border-[#00A19C] text-[#002D72] ring-2 ring-[#00A19C]/20 shadow-md shadow-[#00A19C]/5'
                                                        : 'bg-[#FDFDFD] border-slate-100 hover:border-[#002D72] text-[#002D72]'
                                                    }`}
                                                >
                                                    <div className="flex items-center gap-2.5 z-10 flex-1 min-w-0 pr-1">
                                                        <div className={`w-8 h-8 flex items-center justify-center shrink-0 transition-all rounded ${
                                                            isDone 
                                                            ? 'bg-[#FDFDFD] text-[#00A19C]' 
                                                            : isActive 
                                                            ? `bg-[#00A19C] text-[#FDFDFD] ${(!isManualFrozen && isRunning) ? 'animate-pulse' : ''}` 
                                                            : 'bg-slate-100 text-slate-300'
                                                        }`}>
                                                            {isDone ? <Check size={18} /> : <ChevronRight size={18} />}
                                                        </div>
                                                        <span className={`text-[15px] font-black uppercase tracking-wider leading-[1.05] text-left ${isDone ? 'italic opacity-80' : ''}`}>
                                                            {lines[0]}<br/>{lines[1] || ''}
                                                        </span>
                                                    </div>
                                                    
                                                    {/* Waktu countdown tugas berukuran raksasa 6xl dengan font Bebas Neue */}
                                                    <div className={`font-bebas text-6xl font-black tracking-normal z-10 shrink-0 pl-1 leading-none pt-1 ${
                                                        isDone 
                                                        ? 'text-[#FDFDFD]' 
                                                        : isActive 
                                                        ? 'text-[#00A19C]' 
                                                        : 'text-slate-300'
                                                    }`}>
                                                        {formatTime(displaySeconds)}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Tombol Aksi di Bagian Bawah Tiap Kelompok (Grid Kolom-2 Simetris) */}
                                    <div className="px-5 pb-5 pt-2 bg-[#FDFDFD] grid grid-cols-2 gap-3 shrink-0">
                                        <button
                                            onClick={() => {
                                                const next = [...openOverlays];
                                                next[sIdx] = true;
                                                setOpenOverlays(next);
                                            }}
                                            className="w-full py-2.5 border-2 border-dashed border-[#002D72] text-[#002D72] hover:bg-[#002D72] hover:text-[#FDFDFD] transition-all font-black text-[11px] uppercase tracking-wider flex items-center justify-center gap-1.5 rounded"
                                        >
                                            <Users size={14} />
                                            LIHAT TUGAS
                                        </button>
                                        <button
                                            onClick={() => {
                                                const next = [...openIpOverlays];
                                                next[sIdx] = true;
                                                setOpenIpOverlays(next);
                                            }}
                                            className="w-full py-2.5 border-2 border-dashed border-[#00A19C] text-[#00A19C] hover:bg-[#00A19C] hover:text-[#FDFDFD] transition-all font-black text-[11px] uppercase tracking-wider flex items-center justify-center gap-1.5 rounded"
                                        >
                                            <RouterIcon className="w-3.5 h-3.5" />
                                            LIHAT IP
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </main>
                </div>
            );
        };

        // Render Komponen Utama
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
