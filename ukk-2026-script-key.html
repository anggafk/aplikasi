<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikrotik Config Viewer - Racing Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFDFD; /* Speed White */
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .config-area {
            min-height: 550px;
            transition: all 0.2s ease;
        }

        /* Custom Scrollbar menggunakan Petronas Cyan */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #00A19C; 
            border-radius: 2px;
        }
        
        /* Animasi Feedback menggunakan Red Bull Accent */
        .btn-feedback {
            animation: pulse 0.5s ease-in-out;
            background-color: #E10600 !important;
            color: white !important;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- Navigasi Tombol Alfabet (Grid 12 Kolom - Sauber Blue & Petronas Cyan) -->
        <div class="bg-white p-2 rounded-sm shadow-md border-b-4 border-[#00A19C] mb-6">
            <div id="button-container" class="grid grid-cols-12 gap-1">
                <!-- Tombol akan di-generate oleh JS -->
            </div>
        </div>

        <!-- Area Tampilan Konfigurasi (Terminal) -->
        <div class="bg-slate-900 rounded-sm shadow-2xl overflow-hidden border border-[#002D72]">
            <!-- Header Terminal dengan Sauber Blue -->
            <div class="flex items-center justify-between px-5 py-3 bg-[#002D72] border-b border-[#00A19C]">
                <div class="flex items-center space-x-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-[#00A19C]"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-500"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-500"></div>
                    <span class="ml-4 text-[10px] font-bold text-[#FDFDFD] uppercase tracking-widest" id="config-title">
                        Ready to Race - Select Node
                    </span>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button id="copy-btn" onclick="copyScript()" class="text-[10px] uppercase font-black text-[#00A19C] hover:text-[#FDFDFD] transition-colors tracking-tighter flex items-center">
                        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        Salin Script
                    </button>
                    
                    <button onclick="clearConfig()" class="text-[10px] uppercase font-bold text-slate-400 hover:text-[#E10600] transition-colors tracking-tighter">
                        Reset
                    </button>
                </div>
            </div>
            
            <div class="p-6">
                <!-- Teks terminal menggunakan Speed White di dalam textarea -->
                <textarea 
                    id="config-textarea" 
                    class="mono w-full bg-transparent text-[#FDFDFD] outline-none resize-none leading-relaxed config-area text-xs sm:text-sm" 
                    placeholder="[admin@MikroTik] > Pilih huruf di atas untuk memuat data..."
                    readonly
                ></textarea>
            </div>
        </div>

        <footer class="mt-6 flex justify-between items-end px-1">
            <div class="flex flex-col space-y-1">
                <div class="flex space-x-1">
                    <div class="w-8 h-1 bg-[#002D72]"></div>
                    <div class="w-8 h-1 bg-[#00A19C]"></div>
                    <div class="w-8 h-1 bg-[#E10600]"></div>
                </div>
                <div class="text-[#002D72] text-[10px] font-black uppercase tracking-[0.2em]">
                    MikroTik Config <span class="text-[#00A19C]">v2.8</span>
                </div>
            </div>
            <div class="text-slate-400 text-[9px] uppercase font-bold italic">
                Performance Optimized
            </div>
        </footer>
    </div>

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const excluded = ["I", "O"];
        const filteredAlphabet = alphabet.filter(letter => !excluded.includes(letter));

        // Generate tombol alfabet
        filteredAlphabet.forEach(letter => {
            const btn = document.createElement('button');
            btn.textContent = letter;
            btn.className = `w-full h-8 flex items-center justify-center rounded-sm 
                             bg-[#FDFDFD] border border-slate-200 text-[#002D72] font-black text-xs
                             hover:bg-[#00A19C] hover:text-white transition-all duration-100 shadow-sm`;
            
            btn.onclick = () => loadConfiguration(letter);
            buttonContainer.appendChild(btn);
        });

        function loadConfiguration(letter) {
            document.querySelectorAll('#button-container button').forEach(b => {
                b.classList.remove('bg-[#002D72]', 'text-white', 'border-[#00A19C]', 'shadow-md');
                b.classList.add('bg-[#FDFDFD]', 'text-[#002D72]', 'border-slate-200', 'shadow-sm');
            });
            
            const activeBtn = Array.from(document.querySelectorAll('#button-container button'))
                                  .find(b => b.textContent === letter);
            
            if (activeBtn) {
                activeBtn.classList.remove('bg-[#FDFDFD]', 'text-[#002D72]', 'border-slate-200', 'shadow-sm');
                activeBtn.classList.add('bg-[#002D72]', 'text-white', 'border-[#00A19C]', 'shadow-md');
            }

            configTitle.textContent = `Analyzing Data: UKK-${letter} (Racing Mode)`;

            if (scripts[letter]) {
                configTextarea.value = scripts[letter];
            } else {
                configTextarea.value = `# Konfigurasi untuk huruf [${letter}] tidak ditemukan.`;
            }
        }

        function copyScript() {
            const textToCopy = configTextarea.value;
            if (!textToCopy || textToCopy.trim() === "" || textToCopy.startsWith("[admin@MikroTik]")) return;

            configTextarea.select();
            configTextarea.setSelectionRange(0, 99999);

            try {
                const successful = document.execCommand('copy');
                if (successful) showCopyFeedback();
            } catch (err) {
                console.error('Gagal menyalin:', err);
            }
            window.getSelection().removeAllRanges();
        }

        function showCopyFeedback() {
            const originalText = copyBtn.innerHTML;
            copyBtn.classList.add('btn-feedback');
            copyBtn.innerHTML = `
                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                SALIN OK
            `;
            setTimeout(() => {
                copyBtn.classList.remove('btn-feedback');
                copyBtn.innerHTML = originalText;
            }, 1500);
        }

        function clearConfig() {
            configTextarea.value = "";
            configTitle.textContent = "Ready to Race - Select Node";
            document.querySelectorAll('#button-container button').forEach(b => {
                b.classList.remove('bg-[#002D72]', 'text-white', 'border-[#00A19C]', 'shadow-md');
                b.classList.add('bg-[#FDFDFD]', 'text-[#002D72]', 'border-slate-200', 'shadow-sm');
            });
        }
    </script>
</body>
</html>
