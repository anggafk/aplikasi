    // Data Kunci Jawaban Lengkap Kelompok 1 - 6 untuk referensi AI

      2: { baseIp: "219.55.246.0/24", rows: [{ room: "PC 1", host: 49, prefix: "/26", net: ".0", first: ".1", last: ".62", bc: ".63" }, { room: "PC 5", host: 39, prefix: "/26", net: ".64", first: ".65", last: ".126", bc: ".127" }, { room: "PC 2", host: 18, prefix: "/27", net: ".128", first: ".129", last: ".158", bc: ".159" }, { room: "PC 4", host: 12, prefix: "/28", net: ".160", first: ".161", last: ".174", bc: ".175" }, { room: "PC 6", host: 6, prefix: "/29", net: ".176", first: ".177", last: ".182", bc: ".183" }, { room: "PC 3", host: 5, prefix: "/29", net: ".184", first: ".185", last: ".190", bc: ".191" }, { room: "RA-RB", host: 2, prefix: "/30", net: ".192", first: ".193", last: ".194", bc: ".195" }, { room: "RB-RC", host: 2, prefix: "/30", net: ".196", first: ".197", last: ".198", bc: ".199" }, { room: "RC-RD", host: 2, prefix: "/30", net: ".200", first: ".201", last: ".202", bc: ".203" }, { room: "RD-RE", host: 2, prefix: "/30", net: ".204", first: ".205", last: ".206", bc: ".207" }, { room: "RE-RF", host: 2, prefix: "/30", net: ".208", first: ".209", last: ".210", bc: ".211" }] },

      5: { baseIp: "81.209.167.0/24", rows: [{ room: "PC 1", host: 33, prefix: "/26", net: ".0", first: ".1", last: ".62", bc: ".63" }, { room: "PC 2", host: 28, prefix: "/27", net: ".64", first: ".65", last: ".94", bc: ".95" }, { room: "PC 4", host: 17, prefix: "/27", net: ".96", first: ".97", last: ".126", bc: ".127" }, { room: "PC 5", host: 14, prefix: "/28", net: ".128", first: ".129", last: ".142", bc: ".143" }, { room: "PC 3", host: 10, prefix: "/28", net: ".144", first: ".145", last: ".158", bc: ".159" }, { room: "PC 6", host: 5, prefix: "/29", net: ".160", first: ".161", last: ".166", bc: ".167" }, { room: "RA-RB", host: 2, prefix: "/30", net: ".168", first: ".169", last: ".170", bc: ".171" }, { room: "RB-RC", host: 2, prefix: "/30", net: ".172", first: ".173", last: ".174", bc: ".175" }, { room: "RC-RD", host: 2, prefix: "/30", net: ".176", first: ".177", last: ".178", bc: ".179" }, { room: "RD-RE", host: 2, prefix: "/30", net: ".180", first: ".181", last: ".182", bc: ".183" }, { room: "RE-RF", host: 2, prefix: "/30", net: ".184", first: ".185", last: ".186", bc: ".187" }] },
      6: { baseIp: "47.154.195.0/24", rows: [{ room: "PC 4", host: 60, prefix: "/26", net: ".0", first: ".1", last: ".62", bc: ".63" }, { room: "PC 2", host: 27, prefix: "/27", net: ".64", first: ".65", last: ".94", bc: ".95" }, { room: "PC 1", host: 24, prefix: "/27", net: ".96", first: ".97", last: ".126", bc: ".127" }, { room: "PC 5", host: 14, prefix: "/28", net: ".128", first: ".129", last: ".142", bc: ".143" }, { room: "PC 6", host: 10, prefix: "/28", net: ".144", first: ".145", last: ".158", bc: ".159" }, { room: "PC 3", host: 5, prefix: "/29", net: ".160", first: ".161", last: ".166", bc: ".167" }, { room: "RA-RB", host: 2, prefix: "/30", net: ".168", first: ".169", last: ".170", bc: ".171" }, { room: "RB-RC", host: 2, prefix: "/30", net: ".172", first: ".173", last: ".174", bc: ".175" }, { room: "RC-RD", host: 2, prefix: "/30", net: ".176", first: ".177", last: ".178", bc: ".179" }, { room: "RD-RE", host: 2, prefix: "/30", net: ".180", first: ".181", last: ".182", bc: ".183" }, { room: "RE-RF", host: 2, prefix: "/30", net: ".184", first: ".185", last: ".186", bc: ".187" }] },
    };

    // SVG Icons
    const UploadIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    );
    const LoaderIcon = () => (
      <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    );
    const CheckCircleIcon = () => (
      <svg className="text-petronas-cyan flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );
    const AlertCircleIcon = () => (
      <svg className="text-sauber-blue flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    );
    const XCircleIcon = () => (
      <svg className="text-red-bull flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    );

    function App() {
      const [selectedGroup, setSelectedGroup] = useState("1");
      const [imagePreview, setImagePreview] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [results, setResults] = useState(null);
      const [errorMsg, setErrorMsg] = useState("");
      const fileInputRef = useRef(null);

      // Gemini API function with retry logic
      const analyzeWithGemini = async (base64String, mimeType, groupId) => {
        // Lingkungan mengeksekusi ini akan otomatis memasukkan API key jika tidak disetel
        const apiKey = ""; 

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const idealKey = vlsmData[groupId];
        const systemPrompt = `Kamu adalah asisten guru jaringan komputer ahli. Tugasmu mengoreksi lembar jawaban VLSM siswa dari gambar yang diunggah.
        Kunci jawaban ideal untuk Kelompok ${groupId} adalah (Network Utama ${idealKey.baseIp}):
        ${JSON.stringify(idealKey.rows)}
        
        Instruksi Koreksi:
        1. Baca tabel jawaban siswa baris demi baris (PC 1, RA-RB, dll). Siswa mungkin menuliskannya berurutan dari atas ke bawah, mungkin tidak sesuai urutan ideal. Cari baris yang sesuai dengan nama ruangannya.
        2. Bandingkan isian Prefix, IP Network, IP Host Pertama, Terakhir, dan Broadcast milik siswa dengan kunci ideal.
        3. Jika siswa menghitung urut (tidak di-sorting dari host terbesar) sehingga Network jatuh di angka kelipatan yang salah, catat sebagai "Invalid Boundary".
        4. Jika siswa salah menyalin ekor (Last Host & Broadcast) dari blok lain, catat "Salah salin ekor/salah kamar".
        5. Beri skor 0 hingga 5 untuk setiap baris. (5 = Benar semua, 4-1 = Sebagian benar/salah hitung, 0 = Kosong/Salah total).
        
        KEMBALIKAN DALAM FORMAT JSON ARRAY SAJA!`;

        const payload = {
          contents: [
            {
              role: "user",
              parts: [
                { text: systemPrompt },
                { inlineData: { mimeType: mimeType, data: base64String } }
              ]
            }
          ],
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: {
                  ruang: { type: "STRING", description: "Nama Ruang/Segmen (misal: PC 1, RA-RB)" },
                  skor: { type: "INTEGER", description: "Skor 0 sampai 5" },
                  catatan: { type: "STRING", description: "Analisis singkat: Sempurna, Invalid Boundary, Salah Hitung, dll" }
                },
                required: ["ruang", "skor", "catatan"]
              }
            }
          }
        };

        // Retry Logic (Exponential Backoff)
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i <= delays.length; i++) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (!jsonText) throw new Error("Format respon tidak valid dari AI.");
            
            return JSON.parse(jsonText);
          } catch (err) {
            if (i === delays.length) {
              throw new Error("Gagal menghubungi AI setelah beberapa kali percobaan. Pastikan koneksi stabil.");
            }
            await new Promise(res => setTimeout(res, delays[i]));
          }
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Reset states
        setResults(null);
        setErrorMsg("");
        
        const reader = new FileReader();
        reader.onloadend = async () => {
          const base64Data = reader.result;
          setImagePreview(base64Data);
          setIsAnalyzing(true);
          
          try {
            const base64String = base64Data.split(',')[1];
            // Match mime type from data URL
            const mimeMatch = base64Data.match(/^data:(image\/[a-zA-Z+]+);base64,/);
            const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
            
            const gradingData = await analyzeWithGemini(base64String, mimeType, selectedGroup);
            
            // Ensure consistent ordering based on the standard 11 rooms if possible
            const standardOrder = ["PC 1", "RA-RB", "PC 2", "RB-RC", "PC 3", "RC-RD", "PC 4", "RD-RE", "PC 5", "RE-RF", "PC 6"];
            gradingData.sort((a, b) => {
               let indexA = standardOrder.indexOf(a.ruang.toUpperCase());
               let indexB = standardOrder.indexOf(b.ruang.toUpperCase());
               if(indexA === -1) indexA = 99;
               if(indexB === -1) indexB = 99;
               return indexA - indexB;
            });

            setResults(gradingData);
          } catch (err) {
            setErrorMsg(err.message || "Terjadi kesalahan saat memproses gambar.");
          } finally {
            setIsAnalyzing(false);
          }
        };
        reader.readAsDataURL(file);
      };

      const triggerFileInput = () => {
        fileInputRef.current?.click();
      };

      const getScoreColor = (score) => {
        if (score === 5) return 'bg-petronas-cyan/10 text-petronas-cyan border-petronas-cyan/30';
        if (score >= 3) return 'bg-sauber-blue/10 text-sauber-blue border-sauber-blue/30';
        return 'bg-red-bull/10 text-red-bull border-red-bull/30';
      };

      const getScoreIcon = (score) => {
        if (score === 5) return <CheckCircleIcon />;
        if (score >= 3) return <AlertCircleIcon />;
        return <XCircleIcon />;
      };

      // Calculate Total
      const totalScore = results ? results.reduce((sum, item) => sum + (item.skor || 0), 0) : 0;
      const maxScore = results ? results.length * 5 : 55;

      return (
        <div className="min-h-screen bg-speed-white text-slate-800 p-3 sm:p-4 md:p-8 font-sans">
          <div className="max-w-5xl mx-auto space-y-4 md:space-y-6">
            
            {/* Header Section */}
            <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100 text-center md:text-left">
              <h1 className="text-2xl sm:text-3xl font-extrabold text-sauber-blue tracking-tight leading-tight">
                Koreksi VLSM
              </h1>
            </div>

            <div className="flex flex-col lg:grid lg:grid-cols-3 gap-4 md:gap-6">
              
              {/* Left Column: Controls & Preview (Sticky on larger screens) */}
              <div className="lg:col-span-1 space-y-4 md:space-y-6">
                <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-4 sm:gap-5 sticky top-4">
                  
                  {/* Dropdown Kelompok */}
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-1.5 sm:mb-2">Pilih Kelompok Soal</label>
                    <div className="relative">
                      <select 
                        value={selectedGroup} 
                        onChange={(e) => {
                          setSelectedGroup(e.target.value);
                          setImagePreview(null);
                          setResults(null);
                          setErrorMsg("");
                        }}
                        className="w-full appearance-none bg-slate-50 border border-slate-200 text-slate-800 py-2.5 sm:py-3 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-petronas-cyan focus:border-transparent font-medium transition-all cursor-pointer text-sm sm:text-base"
                      >
                        {[1, 2, 3, 4, 5, 6].map(num => (
                          <option key={num} value={num}>Jawaban Kelompok {num}</option>
                        ))}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                      </div>
                    </div>
                  </div>

                  {/* Upload Button */}
                  <div>
                    <input 
                      type="file" 
                      accept="image/jpeg, image/png, image/webp" 
                      ref={fileInputRef}
                      onChange={handleFileChange}
                      className="hidden" 
                    />
                    <button 
                      onClick={triggerFileInput}
                      disabled={isAnalyzing}
                      className={`w-full flex items-center justify-center gap-2 py-2.5 sm:py-3 px-4 rounded-xl font-bold text-speed-white transition-all shadow-md text-sm sm:text-base ${isAnalyzing ? 'bg-petronas-cyan/70 cursor-not-allowed' : 'bg-sauber-blue hover:bg-[#001f4f] hover:shadow-lg active:scale-[0.98]'}`}
                    >
                      {isAnalyzing ? (
                        <><LoaderIcon /> Menganalisis...</>
                      ) : (
                        <><UploadIcon /> Unggah Foto</>
                      )}
                    </button>
                  </div>
                </div>

                {/* Image Preview */}
                {imagePreview && (
                  <div className="bg-white p-3 sm:p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p className="text-[10px] sm:text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Pratinjau Foto</p>
                    <div className="relative rounded-xl overflow-hidden bg-slate-100 border border-slate-200 aspect-[4/3] lg:aspect-[3/4] flex items-center justify-center">
                      <img src={imagePreview} alt="Lembar Jawaban" className="w-full h-full object-contain sm:object-cover" />
                      {isAnalyzing && (
                        <div className="absolute inset-0 bg-speed-white/70 backdrop-blur-sm flex flex-col items-center justify-center text-sauber-blue font-medium text-sm">
                          <LoaderIcon />
                          <span className="mt-3 animate-pulse text-center px-2">Membaca tulisan tangan...</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* Right Column: Results */}
              <div className="lg:col-span-2">
                <div className="bg-white p-1 rounded-2xl shadow-sm border border-slate-100 h-full min-h-[300px] md:min-h-[400px]">
                  
                  {!results && !isAnalyzing && !errorMsg && (
                    <div className="h-full flex flex-col items-center justify-center text-slate-400 p-6 sm:p-8 text-center space-y-4">
                      <div className="w-16 h-16 sm:w-20 sm:h-20 bg-slate-50 rounded-full flex items-center justify-center border border-slate-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" className="sm:w-8 sm:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                      </div>
                      <p className="text-sm sm:text-base">Pilih kelompok, lalu unggah foto lembar ujian siswa.<br/>Hasil analisis AI akan muncul di sini.</p>
                    </div>
                  )}

                  {errorMsg && (
                    <div className="h-full flex flex-col items-center justify-center text-red-bull p-6 sm:p-8 text-center">
                      <XCircleIcon />
                      <p className="mt-3 font-medium text-sm sm:text-base">{errorMsg}</p>
                    </div>
                  )}

                  {results && !isAnalyzing && (
                    <div className="p-4 sm:p-5 md:p-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                      
                      {/* Results Header */}
                      <div className="flex flex-row justify-between items-center mb-5 sm:mb-6 pb-5 sm:pb-6 border-b border-slate-100 gap-2">
                        <div className="flex-1">
                          <h2 className="text-lg sm:text-xl font-bold text-sauber-blue leading-tight">Hasil Koreksi</h2>
                          <p className="text-xs sm:text-sm text-slate-500 mt-1">Kunci Kelompok {selectedGroup}</p>
                        </div>
                        <div className="bg-slate-50 px-3 sm:px-5 py-2 sm:py-3 rounded-xl border border-slate-200 text-center min-w-[90px] sm:min-w-[120px]">
                          <p className="text-[10px] sm:text-xs text-slate-500 font-semibold uppercase mb-0.5 sm:mb-1">Total Skor</p>
                          <p className="text-2xl sm:text-3xl font-black text-petronas-cyan leading-none">{totalScore} <span className="text-sm sm:text-lg text-slate-400 font-medium">/ {maxScore}</span></p>
                        </div>
                      </div>

                      {/* List of Results */}
                      <div className="space-y-3 sm:space-y-4">
                        {results.map((row, idx) => (
                          <div key={idx} className={`p-3 sm:p-4 rounded-xl border flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 transition-all hover:shadow-md ${getScoreColor(row.skor)}`}>
                            
                            {/* Title & Icon */}
                            <div className="flex items-center justify-between sm:justify-start gap-2 sm:gap-3 sm:min-w-[110px]">
                              <div className="flex items-center gap-2">
                                {getScoreIcon(row.skor)}
                                <span className="font-bold text-base sm:text-lg whitespace-nowrap">{row.ruang}</span>
                              </div>
                              {/* Mobile Score Badge (visible only on small screens) */}
                              <div className="sm:hidden font-black text-lg bg-white/50 px-2 py-0.5 rounded-md border border-white/40">
                                {row.skor}<span className="text-xs opacity-50">/5</span>
                              </div>
                            </div>
                            
                            {/* Note/Catatan */}
                            <div className="flex-1 bg-white/60 p-2.5 sm:p-3 rounded-lg text-xs sm:text-sm border border-white/50 shadow-sm">
                              <span className="font-semibold text-slate-700 block mb-0.5 sm:mb-1">Catatan AI:</span>
                              <span className="text-slate-700 leading-relaxed break-words">{row.catatan}</span>
                            </div>

                            {/* Desktop Score Badge (hidden on small screens) */}
                            <div className="hidden sm:block text-center sm:text-right min-w-[70px]">
                              <span className="text-[10px] font-bold uppercase tracking-wider opacity-70 block mb-1">Skor</span>
                              <span className="text-2xl font-black">{row.skor}<span className="text-sm opacity-50">/5</span></span>
                            </div>
                            
                          </div>
                        ))}
                      </div>
                      
                    </div>
                  )}

                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // Render the React application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
