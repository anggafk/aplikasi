<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP_STATION - Anggafk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            color: #334155;
            overflow-x: hidden;
        }

        .file-card {
            background: #ffffff;
            border: 2px solid #cbd5e1; /* Border abu kebiruan tegas */
            border-radius: 0px; 
            transition: all 0.2s ease-in-out;
            position: relative;
        }

        .file-card:hover {
            border-color: #64748b; /* Pastel gelap saat hover */
            background: #f8fafc;
            transform: translate(-4px, -4px);
            box-shadow: 6px 6px 0px #475569; /* Shadow biru pastel gelap yang tegas */
        }

        /* Scrollbar Styling Deep Pastel */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 0px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header Deep Pastel -->
    <header class="pt-8 pb-6 px-6 shrink-0 bg-white border-b-4 border-slate-300">
        <div class="container mx-auto max-w-5xl">
            <div class="flex items-center justify-between gap-4">
                <div class="animate-fade">
                    <div class="flex items-center gap-3 mb-1">
                        <div class="w-12 h-12 bg-slate-700 flex items-center justify-center text-slate-100 border-2 border-slate-800">
                            <i class="fas fa-box-archive text-lg"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-black tracking-tighter text-slate-800 uppercase leading-none">App Station</h1>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-1">
                                Central Application Repository
                            </p>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <div id="status-container" class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-[10px] font-black text-slate-100 border-l-4 border-slate-400">
                        <span id="status-dot" class="w-2 h-2 bg-slate-400 animate-pulse"></span>
                        <span id="status-text" class="tracking-widest">CONNECTING...</span>
                    </div>
                    <p class="text-[9px] font-mono text-slate-400 mt-1 uppercase" id="display-path">/loading...</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Area Konten Utama -->
    <main class="flex-1 overflow-hidden flex flex-col container mx-auto max-w-5xl px-6">
        <div class="flex-1 overflow-y-auto custom-scroll py-8 pr-4">
            
            <!-- Grid Container -->
            <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 hidden">
                <!-- Data akan dimasukkan di sini oleh JS -->
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-32">
                <div class="w-10 h-10 border-4 border-slate-200 border-t-slate-600 animate-spin mb-4"></div>
                <p class="text-[11px] font-black text-slate-400 tracking-[0.4em] uppercase">Syncing Node</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden text-center p-12 bg-white border-4 border-slate-700 max-w-md mx-auto">
                <div class="text-slate-600 mb-4">
                    <i class="fas fa-triangle-exclamation text-4xl"></i>
                </div>
                <h3 class="text-lg font-black text-slate-800 uppercase tracking-tighter">System Error</h3>
                <p id="error-message" class="text-slate-500 mt-2 text-xs font-mono"></p>
                <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-slate-800 hover:bg-slate-900 text-white text-xs font-black uppercase tracking-widest transition-all">
                    Retry System
                </button>
            </div>
        </div>
    </main>

    <!-- Footer Terpilih -->
    <footer class="shrink-0 py-4 px-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-[10px] font-black text-white bg-slate-800 border-t-4 border-slate-500">
        <div class="flex items-center gap-4">
            <div class="bg-slate-700 text-slate-200 px-3 py-1 border border-slate-600 uppercase tracking-tighter">
                Version 5.5.0
            </div>
            <div id="file-count" class="text-slate-400 uppercase tracking-widest">
                0 APPS REGISTERED
            </div>
        </div>
        
        <div class="uppercase tracking-[0.3em] text-slate-300">
            &copy; 2026 <span class="text-white">ANGGAFK</span> // APPLICATION HUB
        </div>
        
        <div class="flex items-center gap-4">
            <span class="text-slate-400 flex items-center gap-1 uppercase">
                <i class="fas fa-link text-[8px]"></i> node_stable
            </span>
        </div>
    </footer>

    <script>
        const CONFIG = {
            username: 'anggafk',
            repo: 'aplikasi', 
            path: '' 
        };

        document.getElementById('display-path').innerText = `SYS_NODE:/${CONFIG.username}/${CONFIG.repo}/`;

        function formatDisplayName(fileName) {
            const nameWithoutExt = fileName.substring(0, fileName.lastIndexOf('.')) || fileName;
            return nameWithoutExt.replace(/-/g, ' ').toUpperCase();
        }

        async function fetchFiles() {
            const grid = document.getElementById('file-grid');
            const loading = document.getElementById('loading-state');
            const errorView = document.getElementById('error-state');
            const errorMsg = document.getElementById('error-message');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const fileCountEl = document.getElementById('file-count');

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.path}`);
                
                if (!response.ok) throw new Error(`ERR_${response.status}`);
                
                const data = await response.json();
                
                statusDot.className = "w-2 h-2 bg-emerald-400 shadow-[0_0_8px_#34d399]";
                statusText.innerText = "SYSTEM_ONLINE";
                statusText.className = "text-emerald-400 font-black tracking-widest";

                loading.classList.add('hidden');
                grid.classList.remove('hidden');

                const filteredData = data.filter(file => file.name !== 'index.html' && !file.name.startsWith('.'));
                fileCountEl.innerText = `${filteredData.length} APPS REGISTERED`;

                filteredData.forEach((file, index) => {
                    const card = document.createElement('div');
                    card.className = "animate-fade opacity-0";
                    card.style.animationDelay = `${index * 0.05}s`;

                    let icon = 'fa-file-code';
                    let iconBg = 'bg-slate-100';
                    let iconColor = 'text-slate-500';
                    
                    if (file.type === 'dir') {
                        icon = 'fa-folder-tree';
                        iconBg = 'bg-slate-200';
                        iconColor = 'text-slate-700';
                    } else if (file.name.endsWith('.html')) {
                        icon = 'fa-terminal';
                        iconBg = 'bg-slate-800';
                        iconColor = 'text-white';
                    }

                    const displayName = formatDisplayName(file.name);

                    card.innerHTML = `
                        <a href="${file.name}" target="_blank" rel="noopener noreferrer" class="file-card p-5 flex items-center gap-4 group">
                            <div class="w-14 h-14 ${iconBg} ${iconColor} flex items-center justify-center text-xl border-2 border-slate-200 group-hover:border-slate-800 transition-all">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="text-[12px] font-black text-slate-700 tracking-tight truncate group-hover:text-slate-900 transition-colors">
                                    ${displayName}
                                </h4>
                                <div class="flex items-center gap-3 mt-1">
                                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest bg-slate-50 px-1 border border-slate-200">
                                        ${file.type === 'dir' ? 'DIR' : 'EXE'}
                                    </span>
                                    <span class="text-[9px] font-mono text-slate-400 font-bold uppercase">
                                        ${file.type === 'dir' ? '---' : (file.size / 1024).toFixed(0) + 'KB'}
                                    </span>
                                </div>
                            </div>
                            <div class="text-slate-200 group-hover:text-slate-800 transition-all">
                                <i class="fas fa-arrow-right-long text-[10px]"></i>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                loading.classList.add('hidden');
                errorView.classList.remove('hidden');
                errorMsg.innerText = err.message;
                statusDot.className = "w-2 h-2 bg-red-400";
                statusText.innerText = "SYSTEM_FAULT";
                statusText.className = "text-red-400 font-black";
            }
        }

        document.addEventListener('DOMContentLoaded', fetchFiles);
    </script>
</body>
</html>
