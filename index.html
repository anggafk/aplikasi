<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Manager - Anggafk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f7ff; /* Latar belakang biru sangat muda */
            color: #1e3a8a; /* Teks biru tua */
            overflow-x: hidden;
        }

        .file-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .file-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        /* Scrollbar Styling Biru */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #eff6ff;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #bfdbfe;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header Biru Profesional -->
    <header class="pt-10 pb-6 px-6 shrink-0 bg-white border-b border-blue-100 shadow-sm">
        <div class="container mx-auto max-w-5xl">
            <div class="flex items-center justify-between gap-4">
                <div class="animate-fade">
                    <div class="flex items-center gap-3 mb-1">
                        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-md shadow-blue-200">
                            <i class="fas fa-server text-sm"></i>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight text-blue-900 uppercase">System Repository</h1>
                    </div>
                    <p class="text-[11px] font-bold text-blue-400 uppercase tracking-[0.2em] flex items-center gap-2">
                        <i class="fas fa-cloud text-[10px]"></i>
                        <span id="display-path">/anggafk/loading...</span>
                    </p>
                </div>
                <div class="flex items-center gap-3">
                    <div id="status-container" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-blue-50 border border-blue-100 text-[10px] font-bold text-blue-600 shadow-sm">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-blue-300"></span>
                        <span id="status-text">CONNECTING...</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Area Konten Utama -->
    <main class="flex-1 overflow-hidden flex flex-col container mx-auto max-w-5xl px-6">
        <div class="flex-1 overflow-y-auto custom-scroll py-8 pr-2">
            
            <!-- Grid Container -->
            <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 hidden">
                <!-- Data akan dimasukkan di sini oleh JS -->
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-24">
                <div class="w-8 h-8 border-[3px] border-blue-100 border-t-blue-600 rounded-full animate-spin mb-3"></div>
                <p class="text-[10px] font-bold text-blue-300 tracking-widest uppercase">Fetching Data</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden text-center p-10 bg-white border border-blue-100 rounded-3xl max-w-sm mx-auto shadow-xl shadow-blue-900/5">
                <div class="w-14 h-14 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-red-100">
                    <i class="fas fa-network-wired text-xl"></i>
                </div>
                <h3 class="text-sm font-black text-blue-900 uppercase tracking-tighter">Connection Fault</h3>
                <p id="error-message" class="text-slate-400 mt-2 text-[11px] leading-relaxed font-medium"></p>
                <button onclick="location.reload()" class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-black uppercase tracking-widest rounded-xl transition-all shadow-lg shadow-blue-200">
                    Reconnect System
                </button>
            </div>
        </div>
    </main>

    <!-- Footer Biru Navy -->
    <footer class="shrink-0 py-4 px-6 flex justify-between items-center text-[10px] font-bold text-white bg-blue-900 z-10">
        <div class="flex items-center gap-4">
            <span class="opacity-70">OS VERSION 5.2.0</span>
            <span class="w-1 h-1 rounded-full bg-blue-400"></span>
            <span id="file-count" class="text-blue-200">0 OBJECTS</span>
        </div>
        <div class="uppercase tracking-[0.3em]">© 2026 ANGGAFK • SECURE NODE</div>
        <div class="flex items-center gap-2 bg-blue-800 px-3 py-1 rounded-md">
            <i class="fas fa-shield-alt text-[9px] text-blue-400"></i>
            <span class="text-blue-100">ENCRYPTED</span>
        </div>
    </footer>

    <script>
        /**
         * PENGATURAN REPOSITORY
         */
        const CONFIG = {
            username: 'anggafk',
            repo: 'aplikasi', 
            path: '' 
        };

        document.getElementById('display-path').innerText = `/${CONFIG.username}/${CONFIG.repo}/${CONFIG.path}`;

        /**
         * Fungsi pembersihan nama file
         */
        function formatDisplayName(fileName) {
            const nameWithoutExt = fileName.substring(0, fileName.lastIndexOf('.')) || fileName;
            return nameWithoutExt.replace(/-/g, ' ').toUpperCase();
        }

        async function fetchFiles() {
            const grid = document.getElementById('file-grid');
            const loading = document.getElementById('loading-state');
            const errorView = document.getElementById('error-state');
            const errorMsg = document.getElementById('error-message');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const fileCountEl = document.getElementById('file-count');

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.path}`);
                
                if (!response.ok) throw new Error(`HTTP_STATUS_${response.status}`);
                
                const data = await response.json();
                
                statusDot.className = "w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)] animate-pulse";
                statusText.innerText = "SYSTEM ONLINE";
                statusText.className = "text-blue-600 font-black";

                loading.classList.add('hidden');
                grid.classList.remove('hidden');

                const filteredData = data.filter(file => file.name !== 'index.html' && !file.name.startsWith('.'));
                fileCountEl.innerText = `${filteredData.length} OBJECTS DETECTED`;

                filteredData.forEach((file, index) => {
                    const card = document.createElement('div');
                    card.className = "animate-fade opacity-0";
                    card.style.animationDelay = `${index * 0.04}s`;

                    let icon = 'fa-file-invoice';
                    let iconBg = 'bg-blue-50';
                    let iconColor = 'text-blue-600';
                    
                    if (file.type === 'dir') {
                        icon = 'fa-folder-open';
                        iconBg = 'bg-indigo-50';
                        iconColor = 'text-indigo-600';
                    } else if (file.name.endsWith('.html')) {
                        icon = 'fa-laptop-code';
                        iconBg = 'bg-sky-50';
                        iconColor = 'text-sky-600';
                    }

                    const displayName = formatDisplayName(file.name);

                    card.innerHTML = `
                        <a href="${file.name}" target="_blank" rel="noopener noreferrer" class="file-card p-4 rounded-2xl flex items-center gap-4 group">
                            <div class="w-12 h-12 ${iconBg} ${iconColor} rounded-xl flex items-center justify-center text-lg border border-blue-100 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="text-[12px] font-black text-blue-900 tracking-tight truncate group-hover:text-blue-600 transition-colors italic">
                                    ${displayName}
                                </h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="px-1.5 py-0.5 bg-slate-100 text-[8px] font-black text-slate-400 rounded uppercase tracking-widest">
                                        ${file.type === 'dir' ? 'System' : 'Module'}
                                    </span>
                                    <span class="text-[9px] font-mono text-blue-300 font-bold">
                                        ${file.type === 'dir' ? '--' : (file.size / 1024).toFixed(1) + ' KB'}
                                    </span>
                                </div>
                            </div>
                            <div class="opacity-20 group-hover:opacity-100 group-hover:translate-x-1 transition-all">
                                <i class="fas fa-chevron-right text-[10px] text-blue-600"></i>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                loading.classList.add('hidden');
                errorView.classList.remove('hidden');
                errorMsg.innerText = err.message;
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                statusText.innerText = "SYSTEM OFFLINE";
                statusText.className = "text-red-500 font-black";
            }
        }

        document.addEventListener('DOMContentLoaded', fetchFiles);
    </script>
</body>
</html>
