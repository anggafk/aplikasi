<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP_STATION - Anggafk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --sauber-blue: #002D72;
            --petronas-cyan: #00A19C;
            --speed-white: #FDFDFD;
            --rb-red: #E10600;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--speed-white); 
            color: var(--sauber-blue);
            overflow-x: hidden;
        }

        .file-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Pseudo-element untuk efek fill warna Petronas Cyan dari kiri */
        .file-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px; /* Lebar awal sebagai border kiri */
            height: 100%;
            background-color: var(--petronas-cyan);
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: -1;
        }

        .file-card:hover {
            transform: translateY(-4px);
            border-color: var(--petronas-cyan);
            color: white; /* Mengubah teks utama jadi putih saat BG jadi cyan */
        }

        .file-card:hover::before {
            width: 100%; /* Melebar memenuhi seluruh kartu */
        }

        /* Penyesuaian konten saat hover agar tetap terbaca */
        .file-card:hover h4 { color: white !important; }
        .file-card:hover p { color: rgba(255,255,255,0.7) !important; }
        .file-card:hover i.fa-chevron-right { color: white !important; }

        .icon-container {
            transition: all 0.3s ease;
        }

        .file-card:hover .icon-container {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
        
        /* Ikon di dalam container saat hover */
        .file-card:hover .icon-container i {
            color: white !important;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: var(--speed-white);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--sauber-blue);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="py-4 px-6 shrink-0 bg-[#002D72] text-[#FDFDFD] border-b-4 border-[#00A19C]">
        <div class="container mx-auto max-w-5xl">
            <div class="animate-fade">
                <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">App Station</h1>
            </div>
        </div>
    </header>

    <!-- Bar Info Path & Status -->
    <div class="bg-white border-b border-gray-100 py-2 px-6 shadow-sm">
        <div class="container mx-auto max-w-5xl flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-microchip text-[10px] text-[#00A19C]"></i>
                <p class="text-[9px] font-mono font-bold text-[#002D72] opacity-60 uppercase tracking-widest" id="display-path">/loading...</p>
            </div>
            <div id="status-container" class="flex items-center gap-2 text-[9px] font-black">
                <span id="status-dot" class="w-1.5 h-1.5 bg-gray-300 animate-pulse rounded-full"></span>
                <span id="status-text" class="text-gray-400 tracking-widest uppercase">Initializing</span>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden flex flex-col container mx-auto max-w-5xl px-6">
        <div class="flex-1 overflow-y-auto custom-scroll py-6 pr-1">
            <div id="file-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 hidden">
                <!-- Data injected by JS -->
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-24">
                <div class="w-7 h-7 border-3 border-gray-100 border-t-[#00A19C] rounded-full animate-spin mb-3"></div>
                <p class="text-[9px] font-bold text-gray-400 tracking-widest uppercase">Calibrating System</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden text-center p-10 bg-white border border-[#E10600] rounded-lg max-w-md mx-auto">
                <i class="fas fa-circle-exclamation text-[#E10600] text-2xl mb-3"></i>
                <h3 class="text-xs font-bold text-[#002D72] uppercase tracking-tighter">Critical Fault</h3>
                <p id="error-message" class="text-gray-500 mt-1 text-[9px] font-mono"></p>
                <button onclick="location.reload()" class="mt-5 px-5 py-2 bg-[#E10600] hover:bg-[#b30500] text-white text-[9px] font-bold uppercase tracking-widest transition-all rounded">
                    Reboot Node
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="shrink-0 py-4 px-6 bg-[#002D72] text-[#FDFDFD] border-t-4 border-[#00A19C]">
        <div class="container mx-auto max-w-5xl flex flex-col sm:flex-row justify-between items-center gap-3 text-[9px] font-bold">
            <div class="flex items-center gap-3">
                <span id="file-count" class="bg-[#003d99] px-2 py-0.5 rounded text-[#00A19C]">0 UNITS LOADED</span>
                <span class="text-gray-400 uppercase opacity-60">Build 5.5.0-F1</span>
            </div>
            
            <div class="uppercase tracking-[0.2em] text-[#FDFDFD] opacity-80">
                &copy; 2026 <span class="text-[#00A19C]">ANGGAFK</span>
            </div>
        </div>
    </footer>

    <script>
        const CONFIG = {
            username: 'anggafk',
            repo: 'aplikasi', 
            path: '' 
        };

        document.getElementById('display-path').innerText = `DATA_LINK :/${CONFIG.username}/${CONFIG.repo}/`;

        function formatDisplayName(fileName) {
            const nameWithoutExt = fileName.substring(0, fileName.lastIndexOf('.')) || fileName;
            return nameWithoutExt.replace(/-/g, ' ').toUpperCase();
        }

        async function fetchFiles() {
            const grid = document.getElementById('file-grid');
            const loading = document.getElementById('loading-state');
            const errorView = document.getElementById('error-state');
            const errorMsg = document.getElementById('error-message');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const fileCountEl = document.getElementById('file-count');

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.path}`);
                if (!response.ok) throw new Error(`ERR_${response.status}`);
                const data = await response.json();
                
                statusDot.className = "w-1.5 h-1.5 bg-[#00A19C] rounded-full shadow-[0_0_6px_#00A19C]";
                statusText.innerText = "ACTIVE";
                statusText.className = "text-[#00A19C] font-black tracking-widest uppercase";

                loading.classList.add('hidden');
                grid.classList.remove('hidden');

                const filteredData = data.filter(file => file.name !== 'index.html' && !file.name.startsWith('.'));
                fileCountEl.innerText = `${filteredData.length} UNITS LOADED`;

                filteredData.forEach((file, index) => {
                    const card = document.createElement('div');
                    card.className = "animate-fade opacity-0";
                    card.style.animationDelay = `${index * 0.05}s`;

                    let icon = 'fa-code';
                    let iconColor = 'text-[#00A19C]';
                    if (file.type === 'dir') { icon = 'fa-box-open'; iconColor = 'text-[#002D72]'; }
                    else if (file.name.endsWith('.html')) { icon = 'fa-bolt'; iconColor = 'text-[#E10600]'; }

                    card.innerHTML = `
                        <a href="${file.name}" target="_blank" rel="noopener noreferrer" class="file-card p-4 flex items-center gap-4 group">
                            <div class="icon-container w-10 h-10 bg-[#FDFDFD] flex items-center justify-center text-lg border border-gray-100 rounded z-10">
                                <i class="fas ${icon} ${iconColor} transition-colors"></i>
                            </div>
                            <div class="flex-1 min-w-0 z-10">
                                <h4 class="text-[10px] font-black text-[#002D72] tracking-tight truncate transition-colors">
                                    ${formatDisplayName(file.name)}
                                </h4>
                                <p class="text-[7px] font-bold text-gray-400 uppercase tracking-widest mt-0.5 transition-colors">
                                    ${file.type === 'dir' ? 'ENGINE_MODULE' : 'CORE_APPLICATION'}
                                </p>
                            </div>
                            <i class="fas fa-chevron-right text-[8px] text-gray-300 transition-all transform group-hover:translate-x-1 z-10"></i>
                        </a>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.classList.add('hidden');
                errorView.classList.remove('hidden');
                errorMsg.innerText = err.message;
                statusDot.className = "w-1.5 h-1.5 bg-[#E10600] rounded-full";
                statusText.innerText = "LINK_LOST";
                statusText.className = "text-[#E10600] font-black";
            }
        }
        document.addEventListener('DOMContentLoaded', fetchFiles);
    </script>
</body>
</html>
