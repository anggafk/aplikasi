<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pengacak Kelompok Siswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        themeDark: '#2B4055',    /* Warna background header (gelap) */
                        themeNav: '#344A61',     /* Warna tombol gelap (seperti + TAMBAH) */
                        themeBlue: '#3498DB',    /* Warna biru cerah utama */
                        themeBlueHover: '#2980B9',
                        themeGreen: '#2ECC71'
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animation Utilities */
        @keyframes fadeIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(4px); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-[#f4f6f9] text-slate-700 font-sans pb-20 relative">

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-[100]" style="display: none;"></canvas>

    <!-- Header Atas -->
    <header class="bg-themeDark text-white px-4 sm:px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-40 border-b-[4px] border-themeBlue">
        <div class="flex items-center gap-3 sm:gap-4">
            <div class="bg-themeBlue p-2 sm:p-2.5 rounded-md text-white shadow-sm hidden sm:block">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <h1 class="text-xl md:text-2xl font-bold uppercase tracking-wide leading-none text-white">ACAK KELOMPOK</h1>
        </div>
        <div class="flex justify-end">
            <span class="border border-slate-400 text-slate-200 px-2 sm:px-3 py-1 sm:py-1.5 rounded text-[9px] sm:text-[10px] font-bold uppercase tracking-widest">
                VER 43
            </span>
        </div>
    </header>

    <!-- Modal Zoom Detail Kelompok -->
    <div id="group-zoom-modal" class="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 hidden animate-fade-in" onclick="closeGroupDetail()">
        <div class="bg-white w-full max-w-md rounded-md shadow-2xl flex flex-col overflow-hidden animate-zoom-in border border-slate-200 border-t-[4px] border-t-themeBlue" onclick="event.stopPropagation()">
            <div class="px-6 py-4 flex justify-between items-center border-b border-slate-100">
                <h3 id="zoom-title" class="text-sm font-extrabold text-themeDark uppercase tracking-widest">KELOMPOK</h3>
                <button onclick="closeGroupDetail()" class="text-slate-400 hover:text-themeDark transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="p-6 max-h-[70vh] overflow-y-auto custom-scrollbar bg-slate-50">
                <ul id="zoom-list" class="space-y-2">
                    <!-- Students injected here -->
                </ul>
            </div>
            <div class="px-6 py-4 bg-white border-t border-slate-100 flex justify-between items-center">
                <span id="zoom-count" class="text-xs font-bold text-slate-500 uppercase tracking-wider">0 ANGGOTA</span>
                <button onclick="closeGroupDetail()" class="bg-themeNav hover:bg-themeDark text-white px-5 py-2 rounded-md text-xs font-bold transition-colors uppercase tracking-wider">
                    TUTUP
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Overlay Pengacakan / Tampilan Semua Kelompok -->
    <div id="result-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 md:p-6 hidden animate-fade-in" onclick="closeModal()">
        <div class="bg-[#f4f6f9] w-full h-full rounded-md shadow-2xl flex flex-col overflow-hidden relative animate-zoom-in border border-themeBlue border-t-[4px]" id="modal-content" onclick="event.stopPropagation()">
            
            <!-- Header Modal -->
            <div id="modal-header-bg" class="border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 h-16 transition-colors duration-500 bg-white">
                <div class="flex items-center gap-3">
                    <div id="modal-icon-container">
                        <!-- Icon injected by JS -->
                    </div>
                    <div>
                        <h2 id="modal-title" class="text-sm font-extrabold text-themeDark uppercase tracking-widest">MEMPROSES DATA...</h2>
                    </div>
                </div>
                
                <div id="modal-actions" class="flex gap-2.5 hidden">
                    <button onclick="downloadCSV()" class="bg-themeGreen hover:bg-[#27ae60] text-white px-4 py-1.5 rounded-md text-xs font-bold shadow-sm transition-all flex items-center gap-1.5 uppercase tracking-wider">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        SIMPAN CSV
                    </button>
                    <button onclick="closeModal()" class="bg-themeNav hover:bg-themeDark text-white px-4 py-1.5 rounded-md text-xs font-bold shadow-sm transition-all flex items-center gap-1.5 uppercase tracking-wider">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        TUTUP
                    </button>
                </div>
            </div>

            <!-- Content Modal -->
            <div class="flex-1 p-4 bg-[#f4f6f9] overflow-hidden relative">
                <div class="h-full w-full overflow-y-auto custom-scrollbar px-2 pb-10">
                    <div id="modal-groups-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 items-start">
                        <!-- Groups injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6 mt-2">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
            <!-- Class Selection (Sumber Data) -->
            <section class="lg:col-span-8 bg-white p-5 rounded-md shadow-sm border border-themeBlue border-t-[4px] flex flex-col h-full">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-4 min-h-[44px]">
                    <h2 class="text-sm font-extrabold text-themeDark uppercase tracking-widest">
                        ATURAN SUMBER DATA
                    </h2>
                    <button onclick="toggleImport()" class="bg-themeNav hover:bg-themeDark text-white px-3 py-1.5 rounded text-xs font-bold transition-colors flex items-center gap-1">
                        <span id="import-btn-text">+ IMPORT MANUAL</span>
                    </button>
                </div>

                <div id="class-buttons" class="grid grid-cols-3 sm:grid-cols-6 gap-1.5 sm:gap-2">
                    <!-- Class Buttons injected here -->
                </div>

                <div id="import-panel" class="mt-4 bg-slate-50 p-4 rounded border border-slate-200 hidden animate-fade-in">
                    <textarea id="import-textarea" class="w-full p-3 text-sm border border-slate-200 rounded focus:ring-1 focus:ring-themeBlue focus:border-themeBlue min-h-[100px] outline-none" placeholder="Tempel data siswa di sini..."></textarea>
                    <div class="mt-3 flex justify-end">
                        <button onclick="handleImport()" class="bg-themeBlue text-white px-5 py-2 rounded hover:bg-themeBlueHover text-xs font-bold uppercase tracking-wider transition-all">
                            PROSES DATA
                        </button>
                    </div>
                </div>
            </section>

            <!-- Controls Bar (Pengaturan) -->
            <section class="lg:col-span-4 bg-white p-5 rounded-md shadow-sm border border-themeBlue border-t-[4px] flex flex-col h-full">
                <div class="flex items-center border-b border-slate-100 pb-3 mb-4 min-h-[44px]">
                    <h2 class="text-sm font-extrabold text-themeDark uppercase tracking-widest">PENGATURAN KELOMPOK</h2>
                </div>

                <div class="flex flex-row items-center gap-1.5 sm:gap-2">
                    <div class="relative w-1/3 shrink-0">
                        <select id="group-count-select" class="w-full appearance-none bg-[#f8fafc] border border-slate-200 text-themeDark px-2 py-1.5 sm:py-2 rounded focus:outline-none focus:border-themeBlue text-[9px] sm:text-[10px] font-bold cursor-pointer outline-none text-center m-0">
                            <!-- Options generated by JS -->
                        </select>
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-[10px]">
                            ▼
                        </div>
                    </div>

                    <button id="shuffle-btn" onclick="startShuffling()" class="flex-1 bg-themeBlue hover:bg-themeBlueHover active:bg-themeNav text-white font-bold px-2 py-1.5 sm:py-2 rounded shadow-sm uppercase tracking-tight sm:tracking-wider text-[9px] sm:text-[10px] transition-all flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed m-0">
                        PROSES
                    </button>
                </div>
            </section>
        </div>

        <!-- Main Content: Split View Side-by-Side -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <!-- Left Column: Data Source -->
            <div class="bg-white lg:col-span-5 rounded-md shadow-sm border border-themeBlue border-t-[4px] overflow-hidden flex flex-col h-[650px]">
                <div class="p-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                    <h3 class="text-sm font-extrabold text-themeDark uppercase tracking-widest">
                        DAFTAR SISWA
                    </h3>
                    <span id="total-students" class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-wider">
                        0 SISWA
                    </span>
                </div>
                
                <div class="overflow-y-auto flex-1 p-0 custom-scrollbar bg-white">
                    <div id="student-list-container">
                        <!-- Student Table injected here -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div id="main-results-container" class="lg:col-span-7 rounded-md h-[650px] flex flex-col bg-white border border-themeBlue border-t-[4px] shadow-sm cursor-pointer transition-colors" onclick="if(groups.length > 0) showAllGroupsModal()">
                <div class="p-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                    <h3 class="text-sm font-extrabold text-themeDark uppercase tracking-widest">
                        HASIL PEMBAGIAN
                    </h3>
                    <div id="result-header-actions" class="flex items-center gap-2 hidden">
                        <span id="group-count-badge" class="text-[10px] font-bold bg-themeDark text-white border-none px-3 py-1 rounded-md uppercase tracking-wider shadow-sm">
                            0 KELOMPOK
                        </span>
                        <button onclick="event.stopPropagation(); downloadCSV()" class="bg-white border border-themeBlue hover:bg-themeBlue text-themeBlue hover:text-white p-1.5 rounded-md transition-colors shadow-sm" title="Download CSV">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="overflow-y-auto flex-1 p-4 md:p-5 custom-scrollbar bg-[#f4f6f9] rounded-b-md">
                    <div id="main-groups-grid" class="h-full">
                        <!-- Placeholder or Groups -->
                        <div class="h-full flex flex-col items-center justify-center text-slate-400">
                            <div class="w-16 h-16 bg-white border border-slate-200 rounded flex items-center justify-center text-slate-300 shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="3" y1="9" x2="21" y2="9"></line>
                                    <line x1="9" y1="21" x2="9" y2="9"></line>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Version -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 border-t border-slate-200 p-2.5 flex justify-end items-center z-10 px-6">
        <span class="font-mono font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded border border-slate-200 text-[11px]">v43</span>
    </div>

    <script>
        // Data Dummy
        const classData = {
            "XII TJKT 1": ["AISYAH DINI LESTARI", "ALIN ISTIAWATI", "ANGGELA PRISA IRMAWANTY", "APIT RIANI", "ARINDA PUSPITA SAPUTRI", "ARISMA SUCITA KRISTIYANI", "CARVEYNA KEYLA RACHEL WIDODO", "CINTA RACHELLIA ZULFAA", "DIMAS ANDIKA PRATAMA", "DINDA EMILLIYA PUTRI", "EKA NANDA PRATIWI", "EKO MARWOTO", "FAIQ AGESTA PUTRA PRADANA", "FITRIANI NURUL HIDAYAH", "HERMALIA ANANDA PUTRI", "IFNU KAMARRUDIN", "IKHWAN BAYU PAMUNGKAS", "IMEL AYU LISTYANINGRUM", "INA MAYDARA", "ISMA NURAINI", "IVAN ANDRIANSYAH", "KEYSHA SELI ARIANI", "KURNALIA AZZAHRA", "NARA TERESYA GIRI SILALAHI", "NURMA SHANTI", "OKTAVIYA ARUM AMBARWATI", "OLIVIA ASKA SHAHROTUSHITA", "RAMZY ABDUL AZIZ", "RIZKA AMALIA AZIZAH", "SHELVIHANA QOIRUL NURAZIZAH", "TRI RAHAYUNINGSIH", "YUNESYA AYU SETYANINGRUM", "YUNIATI", "ZONATUS FIRSTY DERBYNTA LISKO"],
            "XII TJKT 2": ["ADIBA KANZHA AZAHRA", "ALFIAN ARTA NURHUDA", "ANKWEN FIKRI PRACANDA", "ARDIAN YUDA PRATAMA", "ARZIYITA AMYLYA PUTRI", "AULIYA BUNGA PRATAMA", "CHESYA AULIA FASA", "CHINDY LORISSA PUTRI ANDARI", "DIAH SAFITRI", "FAREL ALFATIN DEE ROMANSYA", "FIRA AMELIA", "HANIFAH ROSADI", "HUWAIDA AN HAWA CHOMSIYATO", "IIN AGUSTINA", "INTAN ALNIKMAH", "ISNA MIFTAHUL MAHMUDAH", "JAMINI", "JEZCIKA SYAHRU ROSITA", "LIA LESTARI", "LIDYA RAHMADANI", "LINTANG AYU GURITNO", "MELIZA MUTOHAROH", "MIFTAHUL JANNAH", "NABILLA NURFATAHILLAH RIZKY", "NURAINI EKA WARDANI", "OLGHA ZHAZHA OCTAVIA", "RANGGA SAPUTRA", "RAUDYA AGUSTIN", "RISKA ADINIATA", "RIZQA MUSKIATUL FALA", "SAIFUL IKHSANUDIN", "SALWA AURELLT NATASYA", "SEPTI RAMADHANI", "SIFA LARAS KINANTHI", "SINMA YUZIKA", "ZEVA DARMA ALVARYZLEE"],
            "XII TJKT 3": ["ADELIA MAHARANI", "ADINDA PUTRI RAMDANI", "AISHAH FEBHI DWI ANGESTI", "AL INSRRA FHARREL PRASETYA", "ANTNANK APRILLIANT LUTHVIANTO", "ARDILIA STAVANYA KARISMA RIANTO", "ARNAN FEBRIAN ZULVIDYA", "AULIA NISHA DESTINA", "AYU AMBARWATI PRAYITNO", "DIAN RAHMAWATI", "DINNAS APRIZAL ARIAWAN", "ELISA TRI YULIANTI", "FITRIA ILMA DWI ROSYIDAH", "IRMA SUCI AULIA", "KEISSYA JUNIA REVALIA", "KHURIN WIDI HARTANTI", "KURNIA BELLA ROSIDA", "LOVELY KENTVYAPRILIA", "MARESA SETIA HASNA LATIFAH", "MELISA YUSTINA PUTRI", "MIXZEAL GANINDRA PURNAMA", "NABILA CAHAYA PRATIWI", "NADYA MASLIHATURROFIAH", "NASTA FATIKASARI", "OLYVIA AYU FIRNANDA", "PUTRI RAHMADHANI", "RIO RESMANA", "RIRIS SENJA LARASATI", "RISDA CLARESTA DEWI", "RISKA ZYAHRANI", "SIGI PUSPITA", "SITI AZIIZAH", "VIERGAAN EZHAR ALFANI", "YOVITA PUTRI LESTARI"],
            "XI TJKT 1": ["AISA WULANSARI", "ANGGI MELANI SAPUTRI", "ANGGRAINI KUSUMA WARDANI", "ARDHITA DEWI PRATIWI", "ASYSYIFA MAWAR DHUHA ENI", "CANTIKA SALSABILLA MAFBUBAH", "CARISA DIAS JULIA ANDINI", "CINTA NAILA SALSABILA", "DIKA PRATAMA", "DINA MARHAYATI", "DINDA PUTRI ADILA", "ENO DARLA AGESTI", "EVITA SAHWA ADHELIA", "EXSEL PRAWIRA ADI WINATA", "FINDA MEILINA NUR AINI", "GALIH LARAS LISTYANI", "HUSEIN NASUHA ADNAN KAHFI", "JIHAN PUTRI ANJANI", "KHAILA DWI SAFITRI", "LUQMAN DAFFA MUMTAZ", "LUTFI NUR LATIFAH", "MANIS MIZELA FISMAURA", "MARSHA DEA AYU PUSPITA SARI", "MAULIDIA QURROTI A'YUN", "MUTIARA ADELIA PUTRI", "NADIA PUSPITA SARI", "NAYARA SAL SABILA AL GHIFARI", "NOVAL SAPUTRA", "NUR ALI IBROHIM", "SHELA MUDMAINAH", "UMMUL KAHFI", "YUNDA SUSILOWATI", "YUSUF ARLIN NUGROHO"],
            "XI TJKT 2": ["ADELIA OCTAVIANI", "AILSYA ANIN DYASUCI", "AL FIYATUN NUR MARFUAH", "ALIFA HEPY FEBRIANA", "ALMIRA PUTRIANA ARIFIAH", "ALYA NUR ROHIDAH", "AMALIA CITRA OKTAVIA", "ANASTASYA INDAH PRATIWI", "AULIA PUTRI RAHMAWATI", "CHOIRUN NISA AYU SOLEHAH", "CIKA AYU DIAH SASMITA", "DHIMAS BASRI PRANATA", "DZAKY HELMI ADITYA", "EKA FEBRIANA", "FAIDZIN ABELTINO", "FHARIZ NUR KOSASIH", "FIANZA BINTANG PERMANA", "HAZNA NUR RAHMADANI", "HERLINA SINDY CAHYA NOFFIANTI", "JESSECA ANASTASYA DEWI", "KHUMAIRO MAHFUZAH", "LINDA NIMAS PUSPITANINGRUM", "LUKMAN DWI JAMALUDIN", "MARTA RAMADANI", "NIKEN SARI ANGGRAINI", "OKTAVIANO ARYAN PRATAMA", "RESA MAGHFIROH RAHMADANI", "RINDY OKTA VIANI", "RISDA AYATUN HUSNA", "RIZKY WAHYU SHAPUTRA", "RIZMA YUNISA PUTRI", "SHANTIKA SHERLY NOVIANA", "SHELLSI KHOIRUNNISA", "TAFDHILAA AWAYNA ASHILAA HUSNA"],
            "XI TJKT 3": ["ANDIVA FAUSAN ROHIM", "ANGGRA SATRIA", "AULIA AYU OKTAVIA", "CICI MAULIDA", "DESI PUSPITA SARI", "DHIANDRA FAHMI AFNANTA", "DINI WAHYU ASTUTI", "FADZILLA DYAN PUTRI RAHMATIKA", "FARICH ABIDAR ROCHMAN", "FIFI ERNIYATY", "GALIH PERMANA PUTRI", "GENDIS", "HALUD MARLINO SUPRIYANTO", "INALA AILEEN SYAHARJITO", "INDAH PRASASTI", "KHISMA TSU'UMI FATKHULJANAH", "LUTFI BUNGA SAFIRA", "MELANI PUSPITASARI", "MUHAMMAD ZANDIKA MISBAHUDDIN ASSUYUTI", "NAMIRA DWICAHYANI", "PERTIWI WENING WISANTI", "RADITNAHYA PRIYA PUTRA ARDIANA", "RAFI ARDYANSAH", "RIRIN ROHMA SARI", "RODATUL TRI ANIFAH", "SANI PURBA SARI", "SAVIRA NUR AINAYA", "SEPTIA AYU LESTARI", "SHINTA MEI DANIA", "SYAFIRA SEPTIANA", "VERA DWI YULIANA", "WAHYU DESTIKA SARI", "ZAHRA ANANDA PANSA"]
        };

        // State
        let students = [];
        let groups = [];
        let groupCount = 1;
        let selectedClass = "";
        let isImportOpen = false;
        let isShuffling = false;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderClassButtons();
            renderGroupCountOptions();
        });

        // Renders
        function renderClassButtons() {
            const container = document.getElementById('class-buttons');
            if(!container) return;
            let html = '';
            for (const cls in classData) {
                const isSelected = selectedClass === cls;
                const classes = isSelected 
                    ? 'bg-themeBlue text-white border-themeBlue' 
                    : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-200';
                html += `<button onclick="loadClass('${cls}')" class="px-1 py-1.5 sm:px-2 sm:py-2 rounded text-[9px] sm:text-[10px] font-bold transition-all border ${classes} uppercase tracking-tight sm:tracking-wider truncate" title="${cls}">${cls}</button>`;
            }
            container.innerHTML = html;
        }

        function renderGroupCountOptions() {
            const select = document.getElementById('group-count-select');
            if(!select) return;
            let html = '';
            for (let i = 1; i <= 15; i++) {
                html += `<option value="${i}">${i}</option>`;
            }
            select.innerHTML = html;
            select.onchange = (e) => groupCount = parseInt(e.target.value);
        }

        function renderStudentTable() {
            const container = document.getElementById('student-list-container');
            const totalStudents = document.getElementById('total-students');
            
            if(totalStudents) totalStudents.innerText = `${students.length} SISWA`;
            if(!container) return;
            
            if (students.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 p-8 text-center min-h-[400px]">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">DATA KOSONG</p>
                    </div>`;
                return;
            }

            let html = `
                <table class="w-full text-sm text-left border-collapse">
                    <thead class="bg-white text-slate-400 font-bold sticky top-0 z-10 text-[10px] uppercase tracking-wider border-b border-slate-100">
                        <tr>
                            <th class="px-4 py-3 w-12 text-center">NO</th>
                            <th class="px-2 py-3">NAMA LENGKAP</th>
                            <th class="px-4 py-3 w-16 text-center">AKSI</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50 text-xs">
            `;

            students.forEach((student, idx) => {
                const rowClass = student.excluded ? 'bg-slate-50 opacity-60' : 'hover:bg-slate-50 bg-white';
                const nameClass = student.excluded ? 'text-slate-400 line-through decoration-slate-400' : 'text-slate-700 font-bold';
                const btnClass = student.excluded 
                    ? 'text-rose-500 hover:bg-rose-100' 
                    : 'text-slate-300 hover:text-themeGreen hover:bg-green-50';
                
                const icon = student.excluded 
                    ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>' 
                    : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

                html += `
                    <tr class="transition-colors ${rowClass}">
                        <td class="px-4 py-2.5 text-center text-slate-400">${idx + 1}</td>
                        <td class="px-2 py-2.5 transition-all ${nameClass} uppercase">${student.name}</td>
                        <td class="px-4 py-2.5 text-center">
                            <button onclick="toggleExclusion(${student.id})" class="w-6 h-6 rounded flex items-center justify-center transition-all mx-auto ${btnClass}">
                                ${icon}
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function showAllGroupsModal() {
            if (groups.length === 0 || isShuffling) return;
            const modal = document.getElementById('result-modal');
            modal?.classList.remove('hidden');
            
            const header = document.getElementById('modal-header-bg');
            const title = document.getElementById('modal-title');
            const actions = document.getElementById('modal-actions');
            const iconContainer = document.getElementById('modal-icon-container');

            if(header) header.className = "border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 h-16 transition-colors duration-500 bg-white";
            if(title) {
                title.innerText = "SEMUA KELOMPOK";
                title.className = "text-sm font-extrabold text-themeDark tracking-widest uppercase";
            }
            actions?.classList.remove('hidden');
            if(iconContainer) iconContainer.innerHTML = `<div class="bg-themeBlue p-1.5 rounded shadow-sm border border-transparent"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg></div>`;
            
            renderGroups(groups, 'modal-groups-grid', true);
        }

        function openGroupDetail(groupIndex) {
            if (isShuffling) return;
            const group = groups[groupIndex];
            if (!group) return;

            const modal = document.getElementById('group-zoom-modal');
            const title = document.getElementById('zoom-title');
            const list = document.getElementById('zoom-list');
            const count = document.getElementById('zoom-count');

            if(title) title.innerText = `KELOMPOK ${groupIndex + 1}`;
            if(count) count.innerText = `${group.length} ANGGOTA`;
            
            let listHtml = '';
            group.forEach((student, sIdx) => {
                listHtml += `
                    <li class="flex items-center gap-3 bg-white p-3 rounded border border-slate-200 shadow-sm">
                        <div class="w-7 h-7 rounded bg-slate-100 border border-slate-200 text-themeDark font-bold flex items-center justify-center text-xs shrink-0">
                            ${sIdx + 1}
                        </div>
                        <span class="font-bold text-themeDark text-sm uppercase truncate">${student.name}</span>
                    </li>
                `;
            });
            if(list) list.innerHTML = listHtml;
            modal?.classList.remove('hidden');
        }

        function closeGroupDetail() {
            const modal = document.getElementById('group-zoom-modal');
            modal?.classList.add('hidden');
        }

        function renderGroups(groupsToRender, containerId, isPreview) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (!groupsToRender || groupsToRender.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400">
                        <div class="w-16 h-16 bg-white border border-slate-200 rounded flex items-center justify-center text-slate-300 shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="21" x2="9" y2="9"></line>
                            </svg>
                        </div>
                    </div>`;
                return;
            }

            const isWideMode = groupsToRender.length <= 2;
            let gridClass = isPreview 
                ? (isWideMode ? 'grid-cols-1 md:grid-cols-2 gap-4' : 'grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3')
                : 'grid-cols-1 sm:grid-cols-2 gap-4';
            
            container.className = `grid ${gridClass} items-start`;

            const maxSlots = Math.max(...groupsToRender.map(g => g.length));

            let html = '';
            groupsToRender.forEach((group, idx) => {
                const listContainerClass = isWideMode ? 'grid grid-cols-2 gap-x-2 gap-y-1' : (isPreview ? 'space-y-1' : 'space-y-1');
                const cardScale = isShuffling ? 'scale-[0.98] opacity-80' : 'scale-100 opacity-100 hover:shadow-md hover:-translate-y-1 hover:border-themeBlue cursor-pointer';

                html += `
                    <div onclick="event.stopPropagation(); openGroupDetail(${idx})" class="bg-white rounded-md shadow-sm border border-slate-200 border-t-[4px] border-t-themeBlue transition-all duration-200 flex flex-col ${cardScale}">
                        <div class="px-3 py-2.5 border-b border-slate-100">
                            <h4 class="font-extrabold text-themeDark uppercase tracking-widest ${isPreview ? 'text-[11px]' : 'text-xs'}">
                                KELOMPOK ${idx + 1}
                            </h4>
                        </div>
                        <div class="${isPreview ? 'p-2' : 'p-3'} flex-1 bg-white rounded-b-md">
                            <ul class="${listContainerClass}">
                `;

                for (let sIdx = 0; sIdx < maxSlots; sIdx++) {
                    const student = group[sIdx];
                    const itemClass = isPreview ? 'text-[10px] p-1 gap-1.5' : 'text-[11px] p-1.5 gap-2';
                    
                    if (student) {
                        html += `
                            <li class="flex items-center font-bold text-slate-600 hover:bg-slate-50 transition-colors rounded ${itemClass}">
                                <div class="${isPreview ? 'w-4 h-4 text-[9px]' : 'w-5 h-5 text-[10px]'} rounded-sm bg-slate-100 text-slate-400 flex items-center justify-center shrink-0">
                                    ${sIdx + 1}
                                </div>
                                <span class="truncate uppercase">${student.name}</span>
                            </li>
                        `;
                    } else {
                        html += `
                            <li class="flex items-center font-bold text-transparent bg-transparent rounded ${itemClass} invisible pointer-events-none select-none">
                                <div class="${isPreview ? 'w-4 h-4 text-[9px]' : 'w-5 h-5 text-[10px]'} rounded-sm bg-transparent text-transparent flex items-center justify-center shrink-0">
                                    0
                                </div>
                                <span class="truncate">X</span>
                            </li>
                        `;
                    }
                }

                html += `</ul></div></div>`;
            });
            container.innerHTML = html;
        }

        function loadClass(className) {
            selectedClass = className;
            const names = classData[className];
            students = names.map((name, index) => ({
                id: Date.now() + index,
                name: name,
                gender: null,
                score: null,
                excluded: false
            }));
            groups = [];
            renderClassButtons();
            renderStudentTable();
            renderGroups([], 'main-groups-grid', false);
            updateResultHeader();
        }

        function toggleImport() {
            isImportOpen = !isImportOpen;
            const panel = document.getElementById('import-panel');
            const btnText = document.getElementById('import-btn-text');
            if (panel) {
                if (isImportOpen) {
                    panel.classList.remove('hidden');
                    if(btnText) btnText.innerText = 'TUTUP IMPORT';
                } else {
                    panel.classList.add('hidden');
                    if(btnText) btnText.innerText = '+ IMPORT MANUAL';
                }
            }
        }

        function handleImport() {
            const textarea = document.getElementById('import-textarea');
            if (!textarea) return;
            const text = textarea.value;
            if (!text.trim()) return;
            
            let parsedStudents = [];
            const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            
            let isSingleLineNamesOnly = false;
            if (lines.length === 1 && !text.includes(',') && !text.includes('\t') && !text.includes(';')) {
                const hasGenderOrScore = /(?:^|\s)(L|P|LAKI-LAKI|PEREMPUAN|\d+(?:[.,]\d+)?)(?:\s|$)/i.test(text);
                if (!hasGenderOrScore) {
                    isSingleLineNamesOnly = true;
                }
            }

            if (isSingleLineNamesOnly) {
                const names = text.split(/\s+/).filter(n => n.trim().length > 0);
                names.forEach((n, i) => {
                    parsedStudents.push({ id: Date.now() + i, name: n, gender: null, score: null, excluded: false });
                });
            } else {
                lines.forEach((line, idx) => {
                    let originalLine = line.trim();
                    let gender = null;
                    let score = null;
                    
                    const genderRegex = /(?:^|\s|,|;)(L|P|LAKI-LAKI|PEREMPUAN)(?:\s|,|;|$)/i;
                    const genderMatch = originalLine.match(genderRegex);
                    if (genderMatch) {
                        gender = genderMatch[1].toUpperCase().charAt(0);
                        originalLine = originalLine.replace(genderMatch[0], ' '); 
                    }

                    const scoreRegex = /(?:^|\s|,|;)(\d+(?:[.,]\d+)?)(?:\s|,|;|$)/;
                    const scoreMatch = originalLine.match(scoreRegex);
                    if (scoreMatch) {
                        let scoreStr = scoreMatch[1].replace(',', '.');
                        score = parseFloat(scoreStr);
                        originalLine = originalLine.replace(scoreMatch[0], ' ');
                    }

                    let name = originalLine.replace(/[,;]/g, ' ').replace(/\s+/g, ' ').trim();

                    if (name) {
                        parsedStudents.push({ id: Date.now() + idx, name, gender, score, excluded: false });
                    }
                });
            }
            
            students = parsedStudents;
            selectedClass = "Custom Import";
            toggleImport();
            textarea.value = '';
            groups = [];
            renderClassButtons();
            renderStudentTable();
            renderGroups([], 'main-groups-grid', false);
            updateResultHeader();
        }

        function toggleExclusion(id) {
            students = students.map(student => 
                student.id === id ? { ...student, excluded: !student.excluded } : student
            );
            renderStudentTable();
        }

        function updateResultHeader() {
            const headerActions = document.getElementById('result-header-actions');
            const badge = document.getElementById('group-count-badge');
            
            if (headerActions) {
                if (groups.length > 0) {
                    headerActions.classList.remove('hidden');
                    if(badge) badge.innerText = `${groups.length} KELOMPOK`;
                } else {
                    headerActions.classList.add('hidden');
                }
            }
        }

        function startShuffling() {
            const activeStudents = students.filter(s => !s.excluded);
            if (activeStudents.length === 0) {
                alert("Tidak ada siswa yang tersedia untuk diacak!");
                return;
            }

            isShuffling = true;
            const btn = document.getElementById('shuffle-btn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = `<svg class="animate-spin-custom w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> MEMPROSES...`;
            }
            
            const modal = document.getElementById('result-modal');
            modal?.classList.remove('hidden');
            updateModalUI(true);

            let currentDelay = 50;
            const maxDelay = 800;
            const slowDownFactor = 1.1;

            const hasGender = activeStudents.some(s => s.gender === 'L' || s.gender === 'P');
            const hasScore = activeStudents.some(s => s.score !== null);

            const shuffleArr = (arr) => {
                let curr = arr.length, rand;
                while (curr !== 0) {
                    rand = Math.floor(Math.random() * curr);
                    curr--;
                    [arr[curr], arr[rand]] = [arr[rand], arr[curr]];
                }
                return arr;
            };

            let targetSizes = Array(groupCount).fill(Math.floor(activeStudents.length / groupCount));
            let remainder = activeStudents.length % groupCount;
            let extraIndices = Array.from({length: groupCount}, (_, i) => i);
            shuffleArr(extraIndices);
            for(let i=0; i<remainder; i++) {
                targetSizes[extraIndices[i]]++;
            }

            const shuffleStep = () => {
                let tempGroups = Array.from({ length: groupCount }, () => []);

                if (currentDelay < maxDelay) {
                    let array = [...activeStudents];
                    shuffleArr(array);
                    
                    let tempTargetSizes = Array(groupCount).fill(Math.floor(activeStudents.length / groupCount));
                    let tempExtraIndices = Array.from({length: groupCount}, (_, i) => i);
                    shuffleArr(tempExtraIndices);
                    for(let i=0; i<remainder; i++) {
                        tempTargetSizes[tempExtraIndices[i]]++;
                    }

                    let sIdx = 0;
                    for (let g = 0; g < groupCount; g++) {
                        for (let i = 0; i < tempTargetSizes[g]; i++) {
                            if (sIdx < array.length) {
                                tempGroups[g].push(array[sIdx++]);
                            }
                        }
                    }
                    
                    groups = tempGroups;
                    // Render to Modal Live Preview
                    renderGroups(groups, 'modal-groups-grid', true);

                    currentDelay = Math.floor(currentDelay * slowDownFactor);
                    setTimeout(shuffleStep, currentDelay);
                } 
                else {
                    let sortedList = [...activeStudents];
                    let genderStats = Array.from({ length: groupCount }, () => ({ L: 0, P: 0, U: 0 }));

                    if (hasScore) {
                        sortedList.forEach(s => s._rand = Math.random()); 
                        sortedList.sort((a, b) => {
                            let scoreA = a.score !== null ? a.score : -999999;
                            let scoreB = b.score !== null ? b.score : -999999;
                            if (scoreB === scoreA) return b._rand - a._rand;
                            return scoreB - scoreA;
                        });

                        let studentIdx = 0;
                        while (studentIdx < sortedList.length) {
                            let availableGroups = Array.from({length: groupCount}, (_, i) => i).filter(i => tempGroups[i].length < targetSizes[i]);
                            let chunk = sortedList.slice(studentIdx, studentIdx + availableGroups.length);
                            studentIdx += availableGroups.length;

                            if (hasGender) {
                                let males = chunk.filter(s => s.gender === 'L');
                                let females = chunk.filter(s => s.gender === 'P');
                                let unknowns = chunk.filter(s => s.gender !== 'L' && s.gender !== 'P');

                                shuffleArr(males); shuffleArr(females); shuffleArr(unknowns);

                                const assignToAvailable = (student, genderKey) => {
                                    shuffleArr(availableGroups);
                                    if (genderKey) {
                                        availableGroups.sort((a, b) => genderStats[a][genderKey] - genderStats[b][genderKey]);
                                    }
                                    let gIdx = availableGroups.shift();
                                    tempGroups[gIdx].push(student);
                                    if (genderKey) genderStats[gIdx][genderKey]++;
                                };

                                males.forEach(m => assignToAvailable(m, 'L'));
                                females.forEach(f => assignToAvailable(f, 'P'));
                                unknowns.forEach(u => assignToAvailable(u, 'U'));
                            } else {
                                shuffleArr(availableGroups);
                                chunk.forEach(student => {
                                    let gIdx = availableGroups.shift();
                                    tempGroups[gIdx].push(student);
                                });
                            }
                        }
                    } else {
                        if (hasGender) {
                            let males = sortedList.filter(s => s.gender === 'L');
                            let females = sortedList.filter(s => s.gender === 'P');
                            let unknowns = sortedList.filter(s => s.gender !== 'L' && s.gender !== 'P');

                            shuffleArr(males); shuffleArr(females); shuffleArr(unknowns);

                            const assignToBestGroup = (student, genderKey) => {
                                let available = Array.from({length: groupCount}, (_, i) => i).filter(i => tempGroups[i].length < targetSizes[i]);
                                shuffleArr(available);
                                if (genderKey) {
                                    available.sort((a, b) => genderStats[a][genderKey] - genderStats[b][genderKey]);
                                }
                                let gIdx = available[0];
                                tempGroups[gIdx].push(student);
                                if (genderKey) genderStats[gIdx][genderKey]++;
                            };

                            males.forEach(m => assignToBestGroup(m, 'L'));
                            females.forEach(f => assignToBestGroup(f, 'P'));
                            unknowns.forEach(u => assignToBestGroup(u, 'U'));
                        } else {
                            shuffleArr(sortedList);
                            let sIdx = 0;
                            for (let g = 0; g < groupCount; g++) {
                                for (let i = 0; i < targetSizes[g]; i++) {
                                    if (sIdx < sortedList.length) {
                                        tempGroups[g].push(sortedList[sIdx++]);
                                    }
                                }
                            }
                        }
                    }

                    tempGroups.forEach(group => {
                        group.sort((a, b) => a.name.localeCompare(b.name, 'id', { sensitivity: 'base' }));
                    });

                    groups = tempGroups;
                    
                    // PERBAIKAN: Render hasil ke Modal dan Dashboard secara bersamaan
                    renderGroups(groups, 'modal-groups-grid', true);
                    renderGroups(groups, 'main-groups-grid', false);
                    updateResultHeader();

                    isShuffling = false;
                    const b = document.getElementById('shuffle-btn');
                    if (b) {
                        b.disabled = false;
                        b.innerHTML = `PROSES`;
                    }
                    updateModalUI(false);
                    startConfetti();
                }
            };
            
            shuffleStep();
        }

        function updateModalUI(shuffling) {
            const header = document.getElementById('modal-header-bg');
            const title = document.getElementById('modal-title');
            const actions = document.getElementById('modal-actions');
            const iconContainer = document.getElementById('modal-icon-container');

            if (shuffling) {
                if(header) header.className = "border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 h-16 transition-colors duration-500 bg-white";
                if(title) {
                    title.innerText = "SISTEM SEDANG MENGACAK...";
                    title.className = "text-sm font-extrabold text-themeDark uppercase tracking-widest";
                }
                actions?.classList.add('hidden');
                if(iconContainer) iconContainer.innerHTML = `<svg class="w-5 h-5 text-themeBlue animate-spin-custom" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            } else {
                if(header) header.className = "border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 h-16 transition-colors duration-500 bg-emerald-50 border-emerald-300 relative overflow-hidden";
                if(title) {
                    title.innerText = "PENGACAKAN SELESAI!";
                    title.className = "text-base font-extrabold text-emerald-800 relative z-10";
                }
                actions?.classList.remove('hidden');
                if(iconContainer) iconContainer.innerHTML = `<div class="bg-white border border-emerald-200 p-1.5 rounded-lg shadow-sm relative z-10"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-600"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3l.04.23a2.9 2.9 0 0 1-2 3.29l-.23.04a2.9 2.9 0 0 0-2.42 2.76l-.02.45a2.9 2.9 0 0 1-2.91 2.77H10a2.9 2.9 0 0 0-2.29 1.1l-.19.26a2.9 2.9 0 0 1-3.6 1.05l-.17-.08a2.9 2.9 0 0 0-3.32.6l-1 1"/></svg></div>`;
            }
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            modal?.classList.add('hidden');
            renderGroups(groups, 'main-groups-grid', false);
            updateResultHeader();
        }

        function downloadCSV() {
            if (groups.length === 0) return;
            let csvContent = "Kelompok,No,Nama Siswa\n";
            groups.forEach((group, groupIndex) => {
                group.forEach((student, studentIndex) => {
                    const safeName = student.name.replace(/"/g, '""');
                    csvContent += `Kelompok ${groupIndex + 1},${studentIndex + 1},"${safeName}"\n`;
                });
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `hasil_kelompok_${(selectedClass || 'group').replace(/\s+/g, '_')}_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Confetti Effect
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            if(!canvas) return;
            canvas.style.display = 'block';
            const ctx = canvas.getContext('2d');
            if(!ctx) return;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#3498DB', '#344A61', '#2B4055', '#2ECC71', '#CBD5E1'];

            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    vx: Math.random() * 5 - 2.5,
                    vy: Math.random() * 5 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 8 + 4,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }

            let animationId;
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y += p.vy;
                    p.x += p.vx;
                    p.rotation += p.rotationSpeed;
                    if (p.y > canvas.height) {
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                });
                animationId = requestAnimationFrame(animate);
            };
            animate();

            setTimeout(() => {
                cancelAnimationFrame(animationId);
                canvas.style.display = 'none';
            }, 4000);
        }
    </script>
